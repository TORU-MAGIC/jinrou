// mode は最下部で 'opening' として初期化
let O = {};

function initOnline() {
  O = {
    ws: null, pid: null, isHost: false,
    roomCode: null, playerName: '', serverAddr: 'localhost:8765',
    setupSub: 'choose',
    players: [], cpuCount: 0,
    myRole: null, wolfPartners: [],
    phase: 'setup',
    day: 0, alive: [], eliminatedLastNight: null,
    nightActionNeeded: null, nightActionDone: false,
    seerResult: null, wolfChosen: null,
    // Wolf chat
    wolfChatMsgs: [], wolfChatReady: false, wolfPartnerNames: [],
    // Discussion
    discMsgs: [], discRound: 1, discTotalRounds: 2,
    currentSpeaker: null, isMyDiscTurn: false,
    tplStep: null,   // null|'cat'|'tgt_accuse'|'tgt_agree'|'tgt_seer'|'msg_neutral'|'msg_accuse'|'msg_defend'|'msg_agree'|'msg_seer'
    tplTarget: null,
    tplSeerType: null, // 'wolf'|'safe'
    // Vote
    voteSubmitted: false, voteDone: 0, voteTotal: 0,
    voteResult: null, winner: null,
    finalPlayers: [], log: [],
    // 役職カミングアウト追跡
    roleClaims: {},   // { playerName: 'SEER'|'DOCTOR' } — 宣言のみ、未確定
    deadPlayers: [],  // [{ name, role, avatar, day }]
    // 投票開始ボタン
    voteReadyNames: [], voteReadyAll: false,
    // 人狼夜選択（ステルス）
    _wolfNightSel: null,
    // P2P固有
    p2pSub: 'choose', soloTotal: 5,
  };
}
initOnline();

function wsConnect(addr, onOpen) {
  const url = addr.startsWith('ws') ? addr : `ws://${addr}`;
  try {
    O.ws = new WebSocket(url);
  } catch(e) { alert('接続できませんでした: ' + e.message); return; }
  O.ws.onopen = onOpen;
  O.ws.onmessage = e => { try { handleServer(JSON.parse(e.data)); } catch(err) {} };
  O.ws.onerror = () => { alert('WebSocket エラー。サーバーが起動しているか確認してください。'); };
  O.ws.onclose = () => {
    if (O.phase !== 'game_over' && O.phase !== 'setup') {
      alert('サーバーとの接続が切れました');
      initOnline(); mode = 'home'; render();
    }
  };
}

function wsSend(msg) {
  if (mode === 'solo')  { SoloEngine.handle(msg); return; }
  if (mode === 'p2p')   { P2PEngine.wsSendP2P(msg); return; }
  if (O.ws && O.ws.readyState === WebSocket.OPEN) O.ws.send(JSON.stringify(msg));
}

function handleServer(data) {
  switch(data.type) {
    case 'room_created':
      O.roomCode = data.code; O.pid = data.pid; O.isHost = true;
      O.players = data.players; O.phase = 'lobby'; break;
    case 'room_joined':
      O.roomCode = data.code; O.pid = data.pid; O.isHost = false;
      O.players = data.players; O.phase = 'lobby'; break;
    case 'player_joined': case 'player_left':
      O.players = data.players; break;
    case 'became_host':
      O.isHost = true; break;
    case 'cpu_count_updated':
      O.cpuCount = data.count; break;
    case 'game_started':
      O.myRole = data.role; O.wolfPartners = data.wolf_partners || [];
      O.players = data.players; O.isHost = data.is_host || O.isHost;
      O.phase = 'role'; break;
    case 'wolf_chat_start':
      O.wolfPartnerNames = data.wolf_names || [];
      O.wolfChatMsgs = []; O.wolfChatReady = false;
      // alive リストをプレイヤー全員で初期化（夜前なので全員生存）
      if (!O.alive || !O.alive.length) O.alive = O.players.map(p=>({ name: p.name }));
      O.phase = 'wolf_chat'; break;
    case 'wolf_chat_msg':
      O.wolfChatMsgs.push({name: data.name, text: data.text}); break;
    case 'night_start':
      O.day = data.day; O.nightActionNeeded = null;
      O.nightActionDone = false; O.seerResult = null; O.wolfChosen = null;
      O.phase = 'night'; break;
    case 'action_needed':
      O.nightActionNeeded = data; break;
    case 'seer_result':
      O.seerResult = {target: data.target, isWolf: data.is_wolf};
      O.nightActionDone = true; break;
    case 'action_ack': case 'wolf_chosen':
      if (data.type === 'wolf_chosen') O.wolfChosen = data.target;
      O.nightActionDone = true; break;
    case 'discuss_start':
      O.discMsgs = []; O.discRound = data.round; O.discTotalRounds = data.total_rounds;
      O.eliminatedLastNight = data.eliminated; O.alive = data.alive;
      O.currentSpeaker = null; O.isMyDiscTurn = false; O.tplStep = null;
      O.voteReadyNames = []; O.voteReadyAll = false;
      // 夜に殺された人を死亡リストへ（役職確定）
      if (data.eliminated) {
        const av = getAvatar(data.eliminated.name, O.players);
        if (!O.deadPlayers.find(d=>d.name===data.eliminated.name))
          O.deadPlayers.push({ name:data.eliminated.name, role:null, avatar:av, day:O.day, cause:'人狼' });
        delete O.roleClaims[data.eliminated.name];
      }
      O.phase = 'discuss';
      O._musicFailTimer = null;
      if (data.eliminated) { setTimeout(() => showKillDrama(data.eliminated.name, data.eliminated.role), 400); }
      // 議論BGM開始 — エンジンが指定した曲名・開始時刻で同期再生（同室複数端末対応）
      setTimeout(() => {
        const onEnd = () => { if (O.phase === 'discuss') wsSend({type:'music_ended'}); };
        if (data.song && data.songStarted) {
          playMusicSync(data.song, data.songStarted, onEnd);
        } else {
          playMusic(_pickSong(), onEnd);
        }
        // ── スマホ音楽ブロック対策: 3秒後に再生できていなければ90秒フォールバック ──
        setTimeout(() => {
          if (O.phase !== 'discuss' || (bgmAudio && !bgmAudio.paused)) return;
          // 音楽が流れていない → 一定時間後に自動で music_ended を送信
          if (!O._musicFailTimer) {
            O._musicFailTimer = setTimeout(() => {
              O._musicFailTimer = null;
              if (O.phase === 'discuss') wsSend({type:'music_ended'});
            }, 90 * 1000); // 90秒後に強制進行
          }
        }, 3000);
      }, 650);
      break;
    case 'disc_new_round':
      O.discRound = data.round; O.currentSpeaker = null; break;
    case 'disc_turn':
      O.currentSpeaker = data.name; O.isMyDiscTurn = false; O.tplStep = null; break;
    case 'your_disc_turn':
      O.isMyDiscTurn = true; O.tplStep = 'cat'; O.tplTarget = null; break;
    case 'disc_message':
      O.discMsgs.push({name: data.name, text: data.text});
      // カミングアウト自動検出（占い師・騎士キーワード）
      if (!O.deadPlayers.find(d=>d.name===data.name)) {
        const seerKw = ['占い師','占いまし','占い結果','占った','黒でした','白でした','人狼です！','人狼ではありません'];
        const docKw  = ['騎士','護衛','守りまし'];
        if (seerKw.some(kw=>data.text.includes(kw))) O.roleClaims[data.name] = 'SEER';
        else if (docKw.some(kw=>data.text.includes(kw)) && !O.roleClaims[data.name]) O.roleClaims[data.name] = 'DOCTOR';
      }
      O.currentSpeaker = null; break;
    case 'day_start':
      O.eliminatedLastNight = data.eliminated; O.alive = data.alive;
      O.phase = 'day'; break;
    case 'vote_ready_upd':
      O.voteReadyNames = data.readyNames || []; break;
    case 'vote_ready_all':
      O.voteReadyAll = true;
      fadeOutMusic(1700);
      break;
    case 'vote_start':
      stopMusic(); // 議論BGMを停止
      if (O._musicFailTimer) { clearTimeout(O._musicFailTimer); O._musicFailTimer = null; }
      O.alive = data.alive; O.voteSubmitted = false;
      O.voteDone = 0; O.voteTotal = data.alive.length;
      O.voteResult = null; O.phase = 'vote'; break;
    case 'vote_progress':
      O.voteDone = data.done; O.voteTotal = data.total; break;
    case 'vote_result':
      O.voteResult = {executed: data.executed, role: data.executed_role, tally: data.tally};
      O.winner = data.winner;
      if (data.players) { O.finalPlayers = data.players; O.log = data.log || []; }
      // 処刑された人を死亡リストへ（役職確定）
      if (data.executed) {
        const av = getAvatar(data.executed, O.players);
        if (!O.deadPlayers.find(d=>d.name===data.executed))
          O.deadPlayers.push({ name:data.executed, role:data.executed_role, avatar:av, day:O.day, cause:'処刑' });
        delete O.roleClaims[data.executed];
      }
      O.phase = 'vote_result'; break;
    case 'game_over':
      O.winner = data.winner; O.finalPlayers = data.players;
      O.log = data.log || []; O.eliminatedLastNight = data.eliminated;
      O.phase = 'game_over';
      setTimeout(() => spawnConfetti(
        data.winner==='village' ? '#4ade8088' : '#ef444488',
        data.winner==='village' ? '#fbbf2488' : '#f8717188'
      ), 300);
      break;
    case 'error':
      alert(data.msg || data.message); return;
  }
  render();
}

// ========== ONLINE RENDERS ==========
function renderOnline() {
  switch(O.phase) {
    case 'setup':      return renderOSetup();
    case 'lobby':      return renderOLobby();
    case 'role':       return renderORole();
    case 'wolf_chat':  return renderOWolfChat();
    case 'night':      return renderONight();
    case 'discuss':    return renderODiscuss();
    case 'day':        return renderODay();
    case 'vote':       return renderOVote();
    case 'vote_result':return renderOVoteResult();
    case 'game_over':  return renderOGameOver();
    default: return '';
  }
}

  // 投票開始ボタン
  const myReady = O.voteReadyNames.includes(O.playerName);
  const voteReadySection = myAlive ? `
    <div class="vote-ready-bar${O.voteReadyAll?' all-ready':''}">
      ${O.voteReadyAll
        ? `<div style="text-align:center;color:#4ade80;font-weight:700;font-size:.95rem;padding:.1rem 0;">

           </div>
           ${O.voteReadyNames.length ? `<div class="vote-ready-dots">
             ${O.voteReadyNames.map(n=>`<span style="font-size:.72rem;background:rgba(34,197,94,.15);border:1px solid #22c55e44;color:#4ade80;padding:.15rem .42rem;border-radius:7px;">${esc(n)}</span>`).join('')}
             <span style="color:#475569;font-size:.72rem;">が準備完了</span>
           </div>` : ''}`
      }
    </div>` : '';

  return `
    ${ph('☀️', `第${O.day}日`, '村人会議 ─ 人狼を探し出せ！', '#fbbf24')}
    ${victimCard}
    ${musicIndicator}

      💬 議論 ─ ラウンド ${O.discRound} / ${O.discTotalRounds}
    </p>
    ${voteReadySection}
    <div class="chat-feed" id="discFeed">${msgs}${typingHtml}${waitHtml}</div>
    ${freeInput}
    ${O.isMyDiscTurn ? renderTplPicker() : ''}
  `;
}

function renderTplPicker() {
  const step = O.tplStep;
  if (!step || step === 'cat') {
    const isSeer = O.myRole === 'SEER';
    return `
      <div style="background:rgba(251,191,36,0.08); border:1px solid #fbbf2444; border-radius:12px; padding:1rem; margin-top:0.5rem;">
        <p style="color:#fbbf24; font-weight:700; font-size:0.9rem; margin-bottom:0.6rem;">👉 あなたの番です！発言を選んでください</p>
        <div class="tpl-cat-grid">
          <button class="tpl-cat" id="tCatNeutral">👀 様子を見る</button>
          <button class="tpl-cat" id="tCatAccuse">🔍 誰かを疑う ▶</button>
          <button class="tpl-cat" id="tCatDefend">✋ 弁護する</button>
          <button class="tpl-cat" id="tCatAgree">👍 同調する ▶</button>
          <button class="tpl-cat" id="tCatQuestion">❓ 質問する</button>
          <button class="tpl-cat" id="tCatPressure">⚡ 訴える</button>
          ${isSeer ? `<div style="grid-column:span 2;"><button class="tpl-cat" id="tCatSeer" style="width:100%;">🔮 占い情報を公開（CO）▶</button><p style="color:#475569;font-size:.7rem;text-align:center;margin:.2rem 0 0;">占い師として名乗り出て占い結果を伝える</p></div>` : ''}
        </div>
      </div>`;
  }
  if (step === 'tgt_accuse' || step === 'tgt_agree' || step === 'tgt_seer') {
    const label = step === 'tgt_accuse' ? '🔍 誰を疑いますか？'
                : step === 'tgt_agree'  ? '👍 誰への同調ですか？'
                                        : '🔮 誰の占い結果ですか？';
    const targets = O.alive.filter(p => p.name !== O.playerName);
    const btns = targets.map(p =>
      `<button class="tpl-btn" id="tgt_${esc(p.name)}" data-step="${step}" data-name="${esc(p.name)}">${esc(p.name)}</button>`
    ).join('');
    return `
      <div style="background:rgba(251,191,36,0.08); border:1px solid #fbbf2444; border-radius:12px; padding:1rem; margin-top:0.5rem;">
        <p style="color:#fbbf24; font-weight:700; font-size:0.9rem; margin-bottom:0.6rem;">${label}</p>
        ${btns}
        <button class="tpl-btn" id="tCatBack" style="color:#64748b; margin-top:0.5rem;">← 戻る</button>
      </div>`;
  }
  // msg_* steps
  let templates = [];
  if (step === 'msg_neutral')   templates = TPL.neutral;
  else if (step === 'msg_accuse')   templates = TPL.accuse.map(t => tplFill(t, O.tplTarget));
  else if (step === 'msg_defend')   templates = TPL.defend;
  else if (step === 'msg_agree')    templates = TPL.agree.map(t => tplFill(t, O.tplTarget));
  else if (step === 'msg_question') templates = TPL.question;
  else if (step === 'msg_pressure') templates = TPL.pressure;
  else if (step === 'msg_seer') {
    templates = [
      ...TPL.seer_wolf.map(t => tplFill(t, O.tplTarget)),
      ...TPL.seer_safe.map(t => tplFill(t, O.tplTarget)),
    ];
  }
  const btns = templates.map(t =>
    `<button class="tpl-btn tpl-send" data-msg="${esc(t)}">${t}</button>`
  ).join('');
  return `
    <div style="background:rgba(251,191,36,0.08); border:1px solid #fbbf2444; border-radius:12px; padding:1rem; margin-top:0.5rem;">
      <p style="color:#fbbf24; font-weight:700; font-size:0.9rem; margin-bottom:0.6rem;">💬 発言を選んでください</p>
      ${btns}
      <button class="tpl-btn" id="tCatBack" style="color:#64748b; margin-top:0.5rem;">← 戻る</button>
    </div>`;
}

          return `<div class="death-entry">

  // アバター付き投票先グリッド（選択補助）

    <div style="display:flex;flex-wrap:wrap;gap:.5rem;margin:.5rem 0 .8rem;">

          style="display:flex;flex-direction:column;align-items:center;min-width:68px;padding:.5rem .4rem;
                 background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;
                 cursor:pointer;transition:background .15s;color:#e2e8f0;">
          <span style="font-size:2rem;line-height:1;">${av.emoji}</span>
          <span style="font-size:.75rem;font-weight:600;margin-top:.2rem;">${esc(p.name)}</span>
          ${badge}
        </button>`;
      }).join('')}
    </div>`;

  return `
    ${ph('🗳️',`第 ${O.day} 日 投票`,'誰を処刑しますか？','#fbbf24')}
    ${deadListHtml}
    <div class="card" style="padding:.8rem;">
      <p style="color:#fbbf24;font-size:.85rem;font-weight:700;margin:0 0 .4rem;">⚖️ 処刑する人を選んでください</p>
      <p style="color:#64748b;font-size:.75rem;margin:0 0 .5rem;">👆 アバターをタップすると自動選択されます</p>
      ${voteGrid}
      ${mkSelect('oVoteTgt', targets)}
      <button class="btn btn-primary" id="oVoteSend" style="margin-top:0.6rem;">🗳️　投票する</button>
    </div>
  `;
}

function renderOVoteResult() {
  const r = O.voteResult;
  if (!r) return '';
  const info = ROLES[r.role] || {};
  const total = Object.values(r.tally).reduce((a,b)=>a+b,0);
  const bars = Object.entries(r.tally).sort(([,a],[,b])=>b-a).map(([n,c]) => {
    const pct = Math.round(c/total*16);
    const bar = '█'.repeat(pct)+'░'.repeat(16-pct);
    return `<div class="vote-bar ${n===r.executed?'executed':''}">${esc(n)}：${bar} ${c}票</div>`;
  }).join('');
  const isWolf = r.role === 'WEREWOLF';
  const isMadman = r.role === 'MADMAN';
  const resultMsg = isWolf
    ? '🎉 人狼を倒しました！村人チームの大きな一歩！'
    : isMadman
    ? '😅 狂人でした…人狼チームの仲間でした！'
    : '😢 村人が処刑されました…人狼はまだ潜んでいる';
  const resultColor = isWolf ? '#4ade80' : isMadman ? '#fbbf24' : '#f87171';
  const nextBtn = O.winner
    ? `<button class="btn btn-primary" id="oGoGameOver">🏆　ゲーム結果を見る</button>`
    : (O.isHost ? `<button class="btn btn-night" id="oNextNight">🌙　夜に進む（ホスト）</button>`
                : `<div class="card" style="text-align:center;"><p style="color:#64748b; font-size:0.85rem;">ホストが次のフェーズへ進めます…</p></div>`);
  return `
    ${ph('⚖️',`第${O.day}日 処刑結果`,'村人会議の結論が出ました','#f87171')}
    <div class="card"><p class="sec-label" style="margin-top:0;">📊 得票数</p>${bars}</div>
    <div class="vote-drama" style="text-align:center; padding:1.5rem; border-radius:16px;
         border:2px solid #ef4444; background:linear-gradient(135deg,#1a0505,#2d0a0a); margin:.6rem 0;">
      <p style="color:#f87171; font-size:.78rem; font-weight:700; letter-spacing:.12em; margin:0 0 .5rem;">⚖️ 処刑決定</p>
      <div style="font-size:3rem; line-height:1; margin:.4rem 0;">${info.icon||'💀'}</div>
      <div style="font-size:2rem; font-weight:900; color:#fff; margin:.4rem 0;">${esc(r.executed)}</div>
      <div style="font-size:1rem; color:#94a3b8; margin-bottom:.8rem;">${info.name||r.role}</div>
      <div style="border-top:1px solid rgba(255,255,255,.1); padding-top:.8rem; color:${resultColor}; font-size:.88rem; font-weight:700;">
        ${resultMsg}
      </div>
    </div>
    ${nextBtn}
  `;
}

function renderOGameOver() {
  const isV = O.winner === 'village';
  const color = isV ? '#4ade80' : '#f87171';
  const rows = O.finalPlayers.map(p => {
    const info = ROLES[p.role] || {};
    return `<div class="player-row" style="border-left-color:${info.color||'#666'};">
      <span class="pr-icon">${info.icon||'?'}</span>
      <span class="pr-name">${esc(p.name)}</span>
      <span class="pr-role" style="color:${info.color||'#aaa'};">${info.name||p.role}</span>
      <span class="pr-status">${p.alive?'✅ 生存':'💀 死亡'}</span>
    </div>`;
  }).join('');
  const logHtml = O.log.length
    ? `<details style="margin-top:1rem;"><summary>📜 ゲームログ</summary>${O.log.map(e=>`<div class="log-entry">• ${esc(e)}</div>`).join('')}</details>` : '';
  return `
    ${ph(isV?'🎉':'🐺', isV?'村人チームの勝利！':'人狼チームの勝利！',
         isV?'人狼を全員倒しました！':'人狼が村を支配しました...', color)}
    <div class="card-colored" style="text-align:center; border:1px solid ${isV?'#22c55e':'#ef4444'}; background:${isV?'#22c55e':'#ef4444'}18; margin-bottom:1.2rem;">
      <p style="color:${color}; margin:0;">${isV?'村人チームの完全勝利！':'人狼の知略が勝りました...'}</p>
    </div>
    <p class="sec-label">📋 全員の役職</p>
    ${rows}${logHtml}
    <hr class="div">
    <button class="btn btn-primary" id="oRestart">🔄　もう一度</button>
  `;
}

// ========== P2P SETUP SCREEN ==========
function renderP2PSetup() {
  const sub = O.p2pSub || 'choose';
  if (sub === 'host_wait') {
    const pRows = (O.players||[]).map(p=>`<span class="chip">${esc(p.name)}</span>`).join('');
    const total = (O.players||[]).length + (O.cpuCount||0);
    const canStart = total >= 4;
    return `
      ${ph('🌐','ホスト待機中','部屋コードを仲間に伝えてください','#34d399')}
      <div class="card" style="text-align:center;border:2px solid #059669;padding:1.5rem;">
        <p style="color:#64748b;font-size:.85rem;margin-bottom:.4rem;">🔑 部屋コード（仲間に伝える）</p>
        <div style="font-size:3rem;font-weight:900;letter-spacing:.3em;color:#34d399;">${O.roomCode||'----'}</div>
        <p class="p2p-badge" style="justify-content:center;margin-top:.5rem;"><span class="p2p-dot"></span>接続待ち...</p>
      </div>
      <p class="sec-label">👥 参加中 (${(O.players||[]).length}人)</p>
      <div class="chips">${pRows||'<span style="color:#475569;font-size:.85rem;">まだ誰もいません</span>'}</div>
      <p class="sec-label">🤖 CPUプレイヤー人数</p>
      <div class="count-ctrl">
        <button class="cnt-btn" id="oCpuDec">−</button>
        <div class="cnt-val" style="font-size:2rem;">${O.cpuCount||0}</div>
        <button class="cnt-btn" id="oCpuInc">＋</button>
      </div>
      <p style="color:#475569;font-size:.8rem;text-align:center;margin-bottom:.5rem;">合計 ${total}人でゲーム（4人以上必要）</p>
      <hr class="div">
      ${canStart
        ? `<button class="btn btn-success" id="p2pStartGame">🎮　ゲームスタート！(計${total}人)</button>`
        : `<div class="card" style="text-align:center;"><p style="color:#64748b;">合計4人以上必要です（現在${total}人）</p></div>`}
      <button class="btn btn-ghost" id="goHome" style="margin-top:.5rem;">← ホームへ戻る</button>`;
  }
  if (sub === 'guest_wait') {
    return `
      ${ph('🌐','P2P接続中','ホストへ接続しています...','#34d399')}
      <div class="card" style="text-align:center;">
        <div style="font-size:2.5rem;margin-bottom:.5rem;">⏳</div>
        <p style="color:#64748b;">ホストへの接続を待っています</p>
        <p class="p2p-badge" style="justify-content:center;margin-top:.5rem;"><span class="p2p-dot"></span>接続中</p>
      </div>
      <button class="btn btn-ghost" id="goHome">← キャンセル</button>`;
  }
  const isJoin = sub === 'join';
  return `
    ${ph('🌐','P2Pオンライン','サーバー不要でどこからでも対戦！','#34d399')}
    <div class="card">
      <label>あなたの名前</label>
      <input type="text" id="p2pName" value="${esc(O.playerName||'')}" placeholder="名前を入力">
    </div>
    ${isJoin ? `
      <div class="card">
        <label>部屋コード（ホストに聞く）</label>
        <input type="text" id="p2pCode" placeholder="例: 12345" style="letter-spacing:.25em;font-size:1.8rem;text-align:center;" maxlength="5" inputmode="numeric">
        <button class="btn btn-success" id="p2pJoin" style="margin-top:.6rem;">🚪　参加する</button>
      </div>
      <button class="btn btn-ghost" id="p2pBackSetup">← 戻る</button>
    ` : `
      <button class="btn btn-success" id="p2pCreate">🏠　部屋を作る（ホスト）</button>
      <button class="btn btn-night" id="p2pGoJoin">🚪　部屋に参加する</button>
      <button class="btn btn-ghost" id="goHome">← ホームへ戻る</button>
    `}
    <div class="card" style="background:rgba(52,211,153,.05);border:1px solid #05966944;margin-top:.8rem;">
      <p style="color:#34d399;font-size:.83rem;font-weight:700;margin-bottom:.3rem;">📡 P2Pオンラインとは？</p>
      <p style="color:#475569;font-size:.8rem;line-height:1.65;">インターネット経由でどこからでも対戦できます。ホストが部屋を作り、仲間にコードを伝えるだけ。人数が足りない場合はCPUを追加できます。</p>
    </div>`;
}

// ========== UPDATED RENDER ==========
function render() {
  const app = document.getElementById('app');
  // チャット入力中のテキストを保持（CPUターンで再描画されても消えないように）
  const _discVal  = document.getElementById('discFreeInput')?.value  || '';
  const _wolfVal  = document.getElementById('wolfFreeInput')?.value  || '';

  if      (mode === 'pre_opening')                         app.innerHTML = renderPreOpening();
  else if (mode === 'opening')                             app.innerHTML = renderOpening();
  else if (mode === 'home')                                app.innerHTML = renderHome();
  else if (mode === 'local')                               app.innerHTML = renderPhase();
  else if (mode === 'solo' && O.phase === 'solo_setup')    app.innerHTML = renderSoloSetup();
  else if (mode === 'p2p'  && O.phase === 'p2p_setup')    app.innerHTML = renderP2PSetup();
  else                                                     app.innerHTML = renderOnline();

  // 入力値を復元
  const discInput = document.getElementById('discFreeInput');
  if (discInput && _discVal) { discInput.value = _discVal; }
  const wolfInput = document.getElementById('wolfFreeInput');
  if (wolfInput && _wolfVal) { wolfInput.value = _wolfVal; }

  // 議論・チャット中は画面トップに飛ばさない（上下スクロール防止）
  const chatPhases = ['discuss','wolf_chat'];
  if (!chatPhases.includes(O.phase)) window.scrollTo(0, 0);
  bindEvents();
  // チャットフィードを末尾にスクロール
  setTimeout(() => {
    ['discFeed','wolfFeed'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.scrollTop = el.scrollHeight;
    });
  }, 30);
}

function renderPhase() {
  switch (S.phase) {
    case 'setup':       return renderSetup();
    case 'role_reveal': return renderRoleReveal();
    case 'night':       return renderNight();
    case 'day':         return renderDay();
    case 'vote':        return renderVote();
    case 'vote_result': return renderVoteResult();
    case 'game_over':   return renderGameOver();
    default: return '';
  }
}

// ========== GLOBAL HELPERS (onclick属性から呼ばれる) ==========
// ローカルゲーム人狼ターゲット選択（ステルス）
function localWolfPick(name) {
  S._wolfLocalSel = name;
  render();
}
function wolfSend(text) {
  wsSend({type:'wolf_chat_msg', text});
  // ローカルにも追加して即表示
  O.wolfChatMsgs.push({name: O.playerName, text});
  render();
  setTimeout(() => { const f = document.getElementById('wolfFeed'); if(f) f.scrollTop = f.scrollHeight; }, 50);
}
function wolfTplTarget(idx) {
  const t = TPL.wolf_night[idx];
  const targets = O.wolfChatMsgs.length > 0
    ? O.alive.filter(p => p.name !== O.playerName)
    : O.alive.filter(p => p.name !== O.playerName);
  if (!targets.length) return;
  // 簡易的に最初のターゲットを選択するUIを表示
  const name = prompt('誰への発言ですか？\n' + targets.map(p=>p.name).join(' / '));
  if (!name) return;
  wolfSend(t.replace('{n}', name));
}

// ========== START ==========
let mode = 'pre_opening'; // pre_opening | opening | home | local | online | solo | p2p
initState();
render();
</script>

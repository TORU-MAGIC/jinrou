<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐺 人狼ゲーム</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(160deg, #0d0d1a 0%, #16213e 60%, #0f3460 100%);
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
  color: #e2e8f0;
}
#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 1rem 1rem 3rem;
  min-height: 100vh;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Typography */
h1 { font-size: 2rem; font-weight: 800; }
h2 { font-size: 1.4rem; font-weight: 700; }
h3 { font-size: 1.1rem; font-weight: 600; }
p  { line-height: 1.6; }

/* Divider */
.div { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 1.2rem 0; }

/* Section label */
.sec-label {
  color: #64748b;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin: 1.2rem 0 0.5rem;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 1.2rem;
  border: 1px solid rgba(255,255,255,0.1);
  margin: 0.6rem 0;
}
.card-colored {
  border-radius: 14px;
  padding: 1.2rem;
  margin: 0.6rem 0;
}

/* Buttons */
.btn {
  display: block;
  width: 100%;
  padding: 0.85rem 1rem;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin: 0.5rem 0;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.02em;
}
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-primary { background: linear-gradient(135deg, #6b21a8, #4338ca); color: #fff; }
.btn-danger  { background: linear-gradient(135deg, #7f1d1d, #7c3aed); color: #fff; }
.btn-success { background: linear-gradient(135deg, #064e3b, #0369a1); color: #fff; }
.btn-night   { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid #4338ca; }
.btn-ghost   { background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }

/* Phase header */
.ph {
  text-align: center;
  padding: 1.5rem 0 0.5rem;
}
.ph .icon { font-size: 3rem; margin-bottom: 0.3rem; }
.ph h1 { margin: 0.2rem 0; }
.ph .sub { color: #64748b; font-size: 0.95rem; margin: 0; }

/* Inputs */
input[type="text"], select {
  width: 100%;
  padding: 0.65rem 0.9rem;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 9px;
  color: #e2e8f0;
  font-size: 0.95rem;
  margin: 0.25rem 0 0.5rem;
  outline: none;
  transition: border-color 0.15s;
}
input[type="text"]:focus, select:focus { border-color: #6b21a8; }
select option { background: #1e1b4b; }
label { color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 0.15rem; }

/* Player name grid */
.name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 0.6rem; }
.name-grid .name-item input { font-size: 0.9rem; }

/* Role counter grid */
.role-grid { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.role-item {
  flex: 1;
  min-width: 70px;
  text-align: center;
  padding: 0.7rem 0.4rem;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}
.role-item .ri { font-size: 1.6rem; }
.role-item .rc { font-size: 1.4rem; font-weight: 800; }
.role-item .rn { font-size: 0.75rem; color: #94a3b8; }

/* Count control */
.count-ctrl {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  margin: 0.5rem 0;
}
.cnt-btn {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
  font-size: 1.5rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
  transition: background 0.15s;
}
.cnt-btn:active { background: rgba(255,255,255,0.18); }
.cnt-val { font-size: 2.8rem; font-weight: 800; color: #fff; min-width: 64px; text-align: center; }

/* Role reveal card */
.role-reveal-card {
  text-align: center;
  padding: 2.2rem 1.5rem;
  border-radius: 18px;
  border: 2px solid;
  margin: 1rem 0;
}
.rrc-icon { font-size: 5rem; margin: 0.5rem 0; }
.rrc-name { font-size: 2.6rem; font-weight: 900; margin: 0.2rem 0; }
.rrc-team { font-size: 0.85rem; color: #94a3b8; }
.rrc-desc { font-size: 0.92rem; color: #cbd5e1; margin-top: 0.9rem; line-height: 1.65; }

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.4rem 0; }
.chip {
  padding: 0.3rem 0.75rem;
  border-radius: 20px;
  font-size: 0.88rem;
  background: rgba(255,255,255,0.09);
  color: #e2e8f0;
}

/* Player row (game over) */
.player-row {
  display: flex;
  align-items: center;
  padding: 0.6rem 1rem;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  margin: 0.3rem 0;
  border-left: 4px solid;
}
.pr-icon { font-size: 1.3rem; margin-right: 0.7rem; }
.pr-name { flex: 1; font-weight: 600; }
.pr-role { font-size: 0.85rem; margin-right: 0.8rem; }
.pr-status { font-size: 0.8rem; color: #475569; }

/* Vote bar */
.vote-bar { font-family: 'Courier New', monospace; font-size: 0.88rem; margin: 0.3rem 0; color: #94a3b8; }
.vote-bar.executed { color: #f87171; font-weight: 700; }

/* Progress text */
.progress { text-align: center; color: #475569; font-size: 0.85rem; margin: 0.4rem 0; }

/* Pass screen */
.pass-screen {
  text-align: center;
  padding: 2rem 1.5rem;
  border-radius: 14px;
  border: 1px solid;
  margin: 0.8rem 0;
}
.pass-screen h3 { margin: 0 0 0.5rem; }
.pass-screen h2 { color: #fff; margin: 0.3rem 0; }
.pass-screen .hint { color: #475569; font-size: 0.85rem; margin: 0; }

/* Log */
details summary { color: #64748b; cursor: pointer; padding: 0.5rem 0; font-size: 0.9rem; }
details summary:hover { color: #94a3b8; }
.log-entry { color: #64748b; font-size: 0.83rem; padding: 0.2rem 0 0.2rem 0.5rem; border-left: 2px solid rgba(255,255,255,0.08); margin: 0.2rem 0; }
/* Chat feed */
.chat-feed {
  max-height: 260px; overflow-y: auto;
  background: rgba(0,0,0,0.25); border-radius: 12px;
  padding: 0.7rem; margin: 0.5rem 0;
  scroll-behavior: smooth;
}
.chat-msg { margin: 0.35rem 0; padding: 0.45rem 0.7rem; background: rgba(255,255,255,0.06); border-radius: 8px; }
.chat-name { color: #818cf8; font-weight: 700; font-size: 0.82rem; margin-right: 0.45rem; }
.chat-text { color: #e2e8f0; font-size: 0.9rem; }
.chat-typing { color: #475569; font-size: 0.78rem; padding: 0.3rem 0.6rem; font-style: italic; }
.wolf-msg { background: rgba(239,68,68,0.1); border-left: 3px solid #ef444488; }
.wolf-msg .chat-name { color: #f87171; }
/* ── Opening Story ── */
.story-overlay{position:fixed;inset:0;background:#050510;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.story-moon{font-size:4.5rem;margin-bottom:1.5rem;}
.story-text{color:#c8d8f4;font-size:1.1rem;line-height:2;max-width:380px;min-height:4rem;transition:opacity .4s ease;}
.story-cursor{display:inline-block;width:2px;height:1em;background:#a5b4fc;margin-left:2px;vertical-align:middle;opacity:.7;}
.story-progress{width:180px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:1.2rem;overflow:hidden;}
.story-progress-bar{height:100%;background:linear-gradient(90deg,#6b21a8,#4338ca);transition:width .5s;}
.story-skip{margin-top:2rem;padding:.5rem 1.6rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;color:#64748b;font-size:.82rem;cursor:pointer;transition:color .2s;}
.story-skip:hover{color:#94a3b8;}

/* ── Kill Drama Overlay ── */
.kill-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;animation:killFadeIn .5s ease;}
@keyframes killFadeIn{from{opacity:0;}to{opacity:1;}}
.kill-icon{font-size:5rem;}
.kill-title{color:#ef4444;font-size:.9rem;font-weight:700;letter-spacing:.12em;margin-bottom:.4rem;margin-top:1.2rem;}
.kill-name{font-size:2.5rem;font-weight:900;color:#fff;margin:.2rem 0;}
.kill-role{color:#94a3b8;font-size:1.05rem;}
.kill-tap{color:#475569;font-size:.8rem;margin-top:1.8rem;}

/* ── Confetti ── */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:800;overflow:hidden;}
.cp{position:absolute;width:9px;height:9px;border-radius:2px;animation:cpFall linear forwards;}
@keyframes cpFall{from{transform:translateY(-20px) rotate(0deg);opacity:1;}to{transform:translateY(110vh) rotate(720deg);opacity:.1;}}

/* ── P2P badge ── */
.p2p-badge{display:inline-flex;align-items:center;gap:.3rem;background:rgba(16,185,129,.14);border:1px solid #10b98144;border-radius:6px;padding:.15rem .5rem;font-size:.74rem;color:#34d399;margin-left:.3rem;}
.p2p-dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:p2pPulse 1.5s ease-in-out infinite;}
@keyframes p2pPulse{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ── Wolf Secret Chat ── */
.secret-bar{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:.6rem 1rem;margin-bottom:.7rem;text-align:center;}
.secret-tag{display:inline-flex;align-items:center;gap:.3rem;background:rgba(239,68,68,.2);border-radius:16px;padding:.2rem .7rem;font-size:.76rem;color:#f87171;font-weight:700;}

/* ── Animations ── */
@keyframes roleReveal{from{opacity:0;}to{opacity:1;}}
.role-reveal-card{animation:roleReveal .4s ease;}
@keyframes voteDrama{from{opacity:0;}to{opacity:1;}}
.vote-drama{animation:voteDrama .4s ease;}
@keyframes phaseIn{from{opacity:0;}to{opacity:1;}}
#app>*{animation:phaseIn .2s ease;}

/* ── Character Avatars ── */
.avatar-grid{display:flex;flex-wrap:wrap;gap:.5rem;margin:.4rem 0;}
.avatar-card{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.6rem .4rem;min-width:72px;max-width:80px;cursor:pointer;transition:background .15s;}
.avatar-card:hover{background:rgba(255,255,255,.12);}
.avatar-card.selected{border:2px solid #6b21a8;background:rgba(107,33,168,.15);}
.avatar-card.dead{opacity:.4;filter:grayscale(1);}
.av-emoji{font-size:2.2rem;line-height:1;}
.av-label{font-size:.72rem;color:#94a3b8;font-weight:600;margin-top:.2rem;text-align:center;}
.av-hint{font-size:.62rem;color:#475569;margin-top:.1rem;text-align:center;line-height:1.3;}
.av-status{font-size:.65rem;margin-top:.2rem;text-align:center;}

/* ── Role Claim Badge ── */
.claim-badge{display:inline-flex;align-items:center;gap:.2rem;font-size:.72rem;padding:.1rem .4rem;border-radius:10px;margin-left:.3rem;font-weight:700;}
.claim-unverified{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid #fbbf2433;}
.claim-confirmed{background:rgba(129,140,248,.2);color:#a5b4fc;border:1px solid #818cf855;}
.claim-dead-wolf{background:rgba(239,68,68,.2);color:#f87171;border:1px solid #ef444455;}

/* ── Death List ── */
.death-list{background:rgba(0,0,0,.3);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:.7rem .8rem;margin:.5rem 0;}
.death-entry{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
.death-entry:last-child{border-bottom:none;}
.de-avatar{font-size:1.4rem;}
.de-name{flex:1;font-size:.88rem;font-weight:600;color:#94a3b8;text-decoration:line-through;}
.de-role{font-size:.8rem;}

/* ── Chat Message with Avatar ── */
.chat-msg{margin:.4rem 0;padding:.5rem .7rem;background:rgba(255,255,255,.06);border-radius:8px;display:flex;align-items:flex-start;gap:.5rem;}
.cm-av{font-size:1.4rem;flex-shrink:0;line-height:1;}
.cm-body{flex:1;}
.cm-name{color:#818cf8;font-weight:700;font-size:.82rem;}
.cm-text{color:#e2e8f0;font-size:.9rem;margin-top:.1rem;}
.wolf-msg{background:rgba(239,68,68,.1);border-left:3px solid #ef444488;}
.wolf-msg .cm-name{color:#f87171;}
.seer-claim-msg{background:rgba(129,140,248,.1);border-left:3px solid #818cf888;}
.my-msg{background:rgba(99,102,241,.12);border-left:3px solid #6b21a8;}

/* Template picker */
.tpl-cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; margin: 0.5rem 0; }
.tpl-cat { padding: 0.75rem 0.5rem; background: rgba(99,102,241,0.13); border: 1px solid #4338ca55;
  border-radius: 10px; color: #a5b4fc; font-size: 0.9rem; cursor: pointer; text-align: center; }
.tpl-cat:active { background: rgba(99,102,241,0.28); }
.tpl-btn { display: block; width: 100%; padding: 0.7rem 1rem; margin: 0.3rem 0;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: #e2e8f0; font-size: 0.9rem; cursor: pointer; text-align: left; }
.tpl-btn:active { background: rgba(255,255,255,0.16); }
.tpl-section-label { color: #64748b; font-size: 0.78rem; margin: 0.8rem 0 0.3rem; }
.cpu-badge { font-size: 0.7rem; background: rgba(99,102,241,0.2); color: #818cf8;
  border-radius: 4px; padding: 0.1rem 0.35rem; margin-left: 0.3rem; }
/* ── Music indicator ── */
.music-bar{background:rgba(251,191,36,.1);border:1px solid #fbbf2433;border-radius:10px;padding:.4rem .8rem;display:flex;align-items:center;gap:.5rem;margin:.3rem 0;}
@keyframes musicPulse{0%,100%{opacity:1;}50%{opacity:.25;}}
/* ── Free chat input bar ── */
.free-chat-bar{display:flex;gap:.35rem;margin:.35rem 0;}
.free-chat-bar input{flex:1;min-width:0;padding:.55rem .7rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:9px;color:#e2e8f0;font-size:.9rem;outline:none;}
.free-chat-bar input:focus{border-color:#6b21a8;}
.free-chat-bar input::placeholder{color:#475569;}
.free-chat-bar .send-btn{padding:.55rem .9rem;border:none;border-radius:9px;background:linear-gradient(135deg,#6b21a8,#4338ca);color:#fff;font-size:.88rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.free-chat-bar .send-btn:active{opacity:.8;}
/* ── Quick agree button ── */
.quick-agree{background:rgba(99,102,241,.18);border:1px solid #4338ca55;color:#a5b4fc;font-size:.66rem;padding:.1rem .32rem;border-radius:6px;cursor:pointer;margin-left:.3rem;vertical-align:middle;line-height:1.4;}
.quick-agree:active{background:rgba(99,102,241,.38);}
/* ── Vote Ready Bar ── */
.vote-ready-bar{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:.55rem .7rem;margin:.45rem 0;}
.vote-ready-bar.all-ready{background:rgba(34,197,94,.12);border-color:#22c55e88;animation:musicPulse .9s ease-in-out infinite;}
.vote-ready-btn{flex:1;padding:.6rem .8rem;border:none;border-radius:9px;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;}
.vote-ready-btn:active{transform:scale(.96);}
.vote-ready-btn.ready{background:rgba(34,197,94,.18);border:1px solid #22c55e55;color:#4ade80;cursor:default;}
.vote-ready-btn.not-ready{background:linear-gradient(135deg,#065f46,#0369a1);color:#fff;}
.vote-ready-dots{display:flex;gap:.25rem;flex-wrap:wrap;margin-top:.3rem;}
/* ── CO quick button ── */
.co-quick-btns{display:flex;flex-wrap:wrap;gap:.3rem;margin:.3rem 0;}
.co-btn{display:inline-flex;align-items:center;gap:.2rem;background:rgba(129,140,248,.14);border:1px solid #818cf855;color:#a5b4fc;font-size:.78rem;padding:.28rem .6rem;border-radius:8px;cursor:pointer;}
.co-btn:active{background:rgba(129,140,248,.3);}
/* ── Stealth night target grid ── */
.night-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin:1rem 0;}
.night-card{position:relative;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);border-radius:14px;padding:.9rem .4rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
.night-card:active{transform:scale(.95);}
.night-card.selected{border-color:#6b21a8;background:rgba(107,33,168,.18);}
.night-card .nc-emoji{font-size:2.2rem;line-height:1;margin-bottom:.3rem;}
.night-card .nc-name{font-size:.78rem;color:#94a3b8;font-weight:600;word-break:break-all;}
.night-card .nc-check{position:absolute;top:.3rem;right:.35rem;font-size:.9rem;opacity:0;}
.night-card.selected .nc-check{opacity:1;}
</style>
</head>

<div id="app"></div>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js" onerror="window._peerJsFailed=true"></script>
<script>
// ========== CHARACTER AVATARS ==========
const CHARACTER_AVATARS = [
  { emoji:'🧙‍♂️', label:'老魔術師',   hint:'謎に包まれた老人…何か知っていそう' },
  { emoji:'🕵️',   label:'かげろう',   hint:'鋭い目つきの調査員。信用できる？' },
  { emoji:'🧛',   label:'ドラクール', hint:'怪しい雰囲気の貴族…人狼では？' },
  { emoji:'👨‍🌾',  label:'のどか',    hint:'普通の農夫に見えるが…' },
  { emoji:'🦹‍♀️', label:'シャドウ',  hint:'影のある女性。何かを隠している？' },
  { emoji:'🧝‍♀️', label:'エルファ',  hint:'神秘的な森の住人。占い師かも' },
  { emoji:'👮‍♂️', label:'田中巡査',  hint:'真面目そうな顔だが…' },
  { emoji:'🧟',   label:'ゾンビ',    hint:'生気のない目。何があった？' },
  { emoji:'🧜‍♀️', label:'ナミ',     hint:'不思議な雰囲気。本当の姿は？' },
  { emoji:'🦸‍♂️', label:'ブレイブ',  hint:'正義感の強い青年。騎士かも' },
];

function getAvatar(name, players) {
  const idx = (players||[]).findIndex(p=>(p.name||p)===name);
  return CHARACTER_AVATARS[(idx<0?0:idx) % CHARACTER_AVATARS.length];
}

// ========== AUDIO SYSTEM ==========
const SONGS = ['人狼ゲーム1.mp3','人狼ゲーム2.mp3','人狼ゲーム3.mp3','人狼ゲーム4.mp3','人狼ゲーム5.mp3','人狼ゲーム6.mp3'];
let bgmAudio = null;
let _usedSongs = [];
let _audioUnlocked = false;
let _primedPool = {}; // iOS対策: ユーザータップ時に全曲プライミング

// iOS/Android: 最初のタップで全曲をプライミング（事前に play→pause して再生権を確保）
function unlockAudio() {
  if (_audioUnlocked) return;
  _audioUnlocked = true;
  // AudioContext unlock (Android Chrome 等)
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (Ctx) {
      const ctx = new Ctx();
      const buf = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
      ctx.resume && ctx.resume();
    }
  } catch(e) {}
  // iOS Safari: 全曲ぶんの Audio 要素をこのジェスチャー内で play() → 直後 pause()
  // これで後から setTimeout 内でも play() が通るようになる
  SONGS.forEach(song => {
    try {
      const a = new Audio(song);
      a.volume = 0;
      const p = a.play();
      const ready = () => { a.pause(); a.currentTime = 0; a.volume = 0.55; _primedPool[song] = a; };
      if (p && typeof p.then === 'function') { p.then(ready).catch(() => {}); }
      else { ready(); }
    } catch(e) {}
  });
}

// プールから取り出す（なければ新規作成）
function _getAudio(src) {
  if (_primedPool[src]) {
    const a = _primedPool[src];
    delete _primedPool[src];
    try { a.currentTime = 0; a.volume = 0.55; } catch(e) {}
    return a;
  }
  return new Audio(src);
}

function _pickSong() {
  if (_usedSongs.length >= SONGS.length) _usedSongs = [];
  const avail = SONGS.map((_,i)=>i).filter(i=>!_usedSongs.includes(i));
  const idx = avail[Math.floor(Math.random()*avail.length)];
  _usedSongs.push(idx);
  return SONGS[idx];
}

function stopMusic() {
  if (bgmAudio) { try{bgmAudio.pause();}catch(e){} try{bgmAudio.src='';}catch(e){} bgmAudio=null; }
}

// 通常再生（プールから取得）
function playMusic(src, onEnd=null) {
  stopMusic();
  const a = _getAudio(src);
  bgmAudio = a;
  a.volume = 0.55;
  if (onEnd) a.onended = () => { if (bgmAudio===a) { bgmAudio=null; onEnd(); } };
  a.play().catch(() => { if (bgmAudio===a) bgmAudio=null; });
  return a;
}

// 同期再生: startedAt(ms) の時刻から再生位置を合わせる（同室複数スマホ対応）
function playMusicSync(src, startedAt, onEnd=null) {
  stopMusic();
  const a = _getAudio(src);
  bgmAudio = a;
  a.volume = 0.55;
  if (onEnd) a.onended = () => { if (bgmAudio===a) { bgmAudio=null; onEnd(); } };
  const doPlay = () => {
    const offset = Math.max(0, (Date.now() - startedAt) / 1000);
    if (isFinite(a.duration) && a.duration > 1 && offset < a.duration - 2) {
      try { a.currentTime = offset; } catch(e) {}
    }
    a.play().catch(() => { if (bgmAudio===a) bgmAudio=null; });
  };
  // readyState >= 2 (HAVE_CURRENT_DATA) なら即再生、そうでなければ canplay 待ち
  if (a.readyState >= 2) {
    doPlay();
  } else {
    a.addEventListener('canplay', doPlay, { once: true });
    setTimeout(() => { if (bgmAudio===a && a.paused) doPlay(); }, 2000);
    a.load();
  }
  return a;
}

function fadeOutMusic(duration=1500, onDone=null) {
  if (!bgmAudio) { if (onDone) onDone(); return; }
  const a = bgmAudio;
  const startVol = a.volume;
  const steps = 30;
  const ms = Math.max(30, duration/steps);
  let step = 0;
  const id = setInterval(() => {
    step++;
    try { a.volume = Math.max(0, startVol*(1-step/steps)); } catch(e){}
    if (step >= steps) {
      clearInterval(id);
      try{a.pause();}catch(e){}
      if (bgmAudio===a) bgmAudio=null;
      if (onDone) onDone();
    }
  }, ms);
}

// ========== HELPERS ==========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function alive() { return S.players.filter(p => p.alive); }
function aliveByRole(r) { return S.players.filter(p => p.alive && p.role === r); }

function checkWin() {
  const a = alive();
  const wolves = a.filter(p => p.role === 'WEREWOLF').length;
  const others = a.length - wolves;
  if (wolves === 0) return 'village';
  if (wolves >= others) return 'wolf';
  return null;
}

function log(msg) { S.log.push(msg); }

function nightSteps() {
  const steps = [];
  const seers = aliveByRole('SEER');
  if (seers.length) steps.push({type:'seer', actor: seers[0]});
  const docs = aliveByRole('DOCTOR');
  if (docs.length) steps.push({type:'doctor', actor: docs[0]});
  const wolves = aliveByRole('WEREWOLF');
  if (wolves.length) steps.push({type:'wolf', actors: wolves});
  return steps;
}

function mkSelect(id, players) {
  const opts = players.map(p => {
    const n = typeof p === 'string' ? p : (p.name || '');
    return `<option value="${esc(n)}">${esc(n)}</option>`;
  }).join('');
  return `<select id="${id}">${opts}</select>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function val(id) { const e = document.getElementById(id); return e ? e.value : ''; }
function on(id, fn) { const e = document.getElementById(id); if (e) e.addEventListener('click', fn); }

        ${isVillage ? '人狼を全員討伐！村人チームの勝利です！' : '人狼が村人と同数以上になりました...'}
      </p>
    </div>
    <p class="sec-label">📋 全員の役職</p>
    ${rows}
    ${logHtml}
    <hr class="div">
    <button class="btn btn-primary" id="restart">🔄　もう一度プレイする</button>
  `;
}

// ========== EVENTS ==========
function saveNames() {
  for (let i = 0; i < 10; i++) {
    const e = document.getElementById(`pn${i}`);
    if (e) S.playerNames[i] = e.value;
  }
}

function bindEvents() {
  // SETUP
  on('dec', () => { if (S.playerCount > 4) { saveNames(); S.playerCount--; render(); } });
  on('inc', () => { if (S.playerCount < 10) { saveNames(); S.playerCount++; render(); } });
  on('start', () => {
    saveNames();
    const names = S.playerNames.slice(0, S.playerCount).map(n => n.trim());
    if (names.some(n => !n))             return alert('名前をすべて入力してください');
    if (new Set(names).size !== names.length) return alert('プレイヤー名が重複しています');

    const roles = shuffle(CONFIGS[S.playerCount] || CONFIGS[6]);
    S.players = names.map((name, i) => ({name, role: roles[i], alive: true}));
    S.revealIdx = 0;
    S.revealShown = false;
    S.phase = 'role_reveal';
    render();
  });

  // ROLE REVEAL
  on('showRole', () => { S.revealShown = true; render(); });
  on('nextReveal', () => {
    S.revealIdx++;
    S.revealShown = false;
    if (S.revealIdx >= S.players.length) {
      S.day = 1;
      S.nightSteps = nightSteps();
      S.nightStepIdx = 0;
      S.nightSub = 'pass';
      S.phase = 'night';
    }
    render();
  });

  // NIGHT - seer
  on('seerReady', () => { S.nightSub = 'select'; render(); });
  on('seerConfirm', () => {
    const target = val('seerTgt');
    const tp = S.players.find(p => p.name === target);
    S.seerResult = {target, isWolf: tp.role === 'WEREWOLF'};
    S.seerHistory.push({day: S.day, ...S.seerResult});
    S.nightSub = 'result';
    render();
  });
  on('seerDone', () => {
    S.nightStepIdx++;
    S.nightSub = 'pass';
    S.seerResult = null;
    render();
  });

  // NIGHT - doctor
  on('docReady',    () => { S.nightSub = 'select'; render(); });
  on('docConfirm',  () => {
    S.doctorTarget = val('docTgt');
    S.nightStepIdx++;
    S.nightSub = 'pass';
    render();
  });

  // NIGHT - wolf (ステルスグリッド)
  on('wolfReady',   () => { S.nightSub = 'select'; S._wolfLocalSel = null; render(); });
  on('wolfConfirm', () => {
    S.wolfTarget = S._wolfLocalSel || '';
    if (!S.wolfTarget) return;
    S._wolfLocalSel = null;
    S.nightStepIdx++;
    S.nightSub = 'pass';
    render();
  });

  // NIGHT - morning
  on('morning', () => {
    const wt = S.wolfTarget;
    const dt = S.doctorTarget;

    if (wt && wt !== dt) {
      const victim = S.players.find(p => p.name === wt);
      victim.alive = false;
      S.elimLastNight = victim;
      log(`第${S.day}夜: ${wt} が人狼に襲われました`);
    } else {
      if (wt && wt === dt) log(`第${S.day}夜: 騎士が ${wt} を護衛しました！`);
      S.elimLastNight = null;
    }

    S.wolfTarget = null;
    S.doctorTarget = null;

    const w = checkWin();
    if (w) {
      S.winner = w;
      S.phase = 'game_over';
    } else {
      S.votes = {};
      S.voteIdx = 0;
      S.voteResult = null;
      S.phase = 'day';
    }
    render();
  });

  // DAY
  on('goVote', () => {
    S.votes = {};
    S.voteIdx = 0;
    S.voteResult = null;
    S.phase = 'vote';
    render();
  });

  // VOTE
  on('castVote', () => {
    const alivePl = alive();
    const voter = alivePl[S.voteIdx];
    S.votes[voter.name] = val('voteTgt');
    S.voteIdx++;

    if (S.voteIdx >= alivePl.length) {
      // Tally votes
      const tally = {};
      Object.values(S.votes).forEach(t => tally[t] = (tally[t]||0)+1);
      const maxV = Math.max(...Object.values(tally));
      const top = Object.keys(tally).filter(n => tally[n] === maxV);
      const executed = top[Math.floor(Math.random()*top.length)];
      const execP = S.players.find(p => p.name === executed);
      execP.alive = false;
      log(`第${S.day}日: ${executed}（${ROLES[execP.role].name}）が処刑されました`);
      S.voteResult = {executed, tally};
      S.winner = checkWin();
      S.phase = 'vote_result';
    }
    render();
  });

  // VOTE RESULT
  on('goNight', () => {
    S.day++;
    S.nightSteps = nightSteps();
    S.nightStepIdx = 0;
    S.nightSub = 'pass';
    S.elimLastNight = null;
    S.phase = 'night';
    render();
  });
  on('goGameOver', () => { S.phase = 'game_over'; render(); });

  // LOCAL GAME OVER
  on('restart', () => { if (confirm('もう一度プレイしますか？')) { initState(); mode = 'home'; render(); } });

  // PRE-OPENING tap → unlock audio & start story
  on('preOpeningTap', () => {
    unlockAudio();
    playMusic(_pickSong());
    O_opening = { idx: 0, text: '' };
    mode = 'opening';
    render();
    runOpeningStory();
  });

  // OPENING
  on('openingSkip', () => { clearTimeout(openingTimer); fadeOutMusic(900, () => { mode = 'home'; render(); }); });

  // HOME
  on('goLocal',  () => { initState(); mode = 'local'; render(); });
  on('goOnline', () => { mode = 'online'; O.phase = 'setup'; render(); });
  on('goSolo',   () => { initOnline(); mode = 'solo'; O.phase = 'solo_setup'; O.soloTotal = 5; render(); });

  // P2P
  on('goP2P', () => { initOnline(); mode = 'p2p'; O.phase = 'p2p_setup'; O.p2pSub = 'choose'; O.cpuCount = 0; render(); });
  on('p2pGoJoin',   () => { O.p2pSub = 'join'; render(); });
  on('p2pBackSetup',() => { O.p2pSub = 'choose'; render(); });
  on('p2pCreate', () => {
    const name = (val('p2pName')||'').trim();
    if (!name) { alert('名前を入力してください'); return; }
    O.playerName = name; O.isHost = true; O.players = [{ pid:0, name }];
    P2PEngine.createRoom(name, code => {
      O.roomCode = code; O.p2pSub = 'host_wait'; render();
    });
  });
  on('p2pJoin', () => {
    const name = (val('p2pName')||'').trim();
    const code = (val('p2pCode')||'').trim();
    if (!name) { alert('名前を入力してください'); return; }
    if (!code) { alert('部屋コードを入力してください'); return; }
    O.playerName = name; O.isHost = false; O.p2pSub = 'guest_wait'; render();
    P2PEngine.joinRoom(name, code,
      () => { /* joined, waiting for game_started */ },
      err => { alert('接続できませんでした: ' + (err?.message||err)); O.p2pSub = 'choose'; render(); }
    );
  });
  on('p2pStartGame', () => { wsSend({ type:'start_game' }); });
  on('oCpuDec', () => {
    if ((O.cpuCount||0) > 0) {
      O.cpuCount--;
      if (mode==='p2p') { render(); } else wsSend({type:'set_cpu_count',count:O.cpuCount});
      render();
    }
  });
  on('oCpuInc', () => {
    if ((O.cpuCount||0) < 6) {
      O.cpuCount++;
      if (mode==='p2p') { render(); } else wsSend({type:'set_cpu_count',count:O.cpuCount});
      render();
    }
  });

  // SOLO SETUP
  on('soloDec',   () => { if ((O.soloTotal||5) > 4) { O.soloTotal--; render(); } });
  on('soloInc',   () => { if ((O.soloTotal||5) < 10) { O.soloTotal++; render(); } });
  on('soloStart', () => {
    const name = (val('soloName')||'').trim() || 'あなた';
    O.playerName = name;
    O.pid = 0;
    O.isHost = true;
    SoloEngine.init(name, O.soloTotal || 5);
  });

  // ONLINE SETUP
  on('oGoJoin',    () => { O.setupSub = 'join'; render(); });
  on('oBackSetup', () => { O.setupSub = 'choose'; render(); });
  on('goHome',     () => { if (O.ws) O.ws.close(); initOnline(); mode = 'home'; render(); });

  on('oCreate', () => {
    const name = (val('oName') || '').trim();
    const addr = (val('oAddr') || '').trim();
    if (!name) { alert('名前を入力してください'); return; }
    O.playerName = name; O.serverAddr = addr;
    wsConnect(addr, () => wsSend({type:'create_room', name}));
  });

  on('oJoin', () => {
    const name = (val('oName') || '').trim();
    const addr = (val('oAddr') || '').trim();
    const code = (val('oCode') || '').trim().toUpperCase();
    if (!name) { alert('名前を入力してください'); return; }
    if (!code) { alert('部屋コードを入力してください'); return; }
    O.playerName = name; O.serverAddr = addr;
    wsConnect(addr, () => wsSend({type:'join_room', name, code}));
  });

  // ONLINE LOBBY
  on('oStart', () => wsSend({type:'start_game'}));

  // ONLINE ROLE → NIGHT
  on('oStartNight', () => wsSend({type:'start_night'}));

  // WOLF CHAT
  on('wolfChatDone', () => { O.wolfChatReady = true; wsSend({type:'wolf_chat_done'}); render(); });
  // wolf テンプレート（target不要）は wolfSend() をグローバル関数として定義
  // wolf テンプレート（target必要）は wolfTplTarget() をグローバル関数として定義
  document.querySelectorAll('.wolf-tpl-send').forEach(btn => {
    btn.addEventListener('click', () => { wolfSend(btn.dataset.msg); });
  });

  // DISCUSS - テンプレートカテゴリ
  on('tCatNeutral',  () => { O.tplStep = 'msg_neutral';  render(); });
  on('tCatAccuse',   () => { O.tplStep = 'tgt_accuse';   render(); });
  on('tCatDefend',   () => { O.tplStep = 'msg_defend';   render(); });
  on('tCatAgree',    () => { O.tplStep = 'tgt_agree';    render(); });
  on('tCatSeer',     () => { O.tplStep = 'tgt_seer';     render(); });
  on('tCatQuestion', () => { O.tplStep = 'msg_question'; render(); });
  on('tCatPressure', () => { O.tplStep = 'msg_pressure'; render(); });
  on('tCatBack',     () => { O.tplStep = 'cat'; O.tplTarget = null; render(); });

  // DISCUSS - target selection buttons (data-step attribute)
  document.querySelectorAll('[data-step]').forEach(btn => {
    btn.addEventListener('click', () => {
      const step = btn.dataset.step;
      O.tplTarget = btn.dataset.name;
      if (step === 'tgt_accuse') O.tplStep = 'msg_accuse';
      else if (step === 'tgt_agree') O.tplStep = 'msg_agree';
      else if (step === 'tgt_seer')  O.tplStep = 'msg_seer';
      render();
    });
  });

  // DISCUSS - message send buttons
  document.querySelectorAll('.tpl-send').forEach(btn => {
    btn.addEventListener('click', () => {
      const msg = btn.dataset.msg;
      if (!msg) return;
      // 占い師カミングアウト検出（msg_seerステップで送信した場合）
      if (O.tplStep === 'msg_seer') {
        O.roleClaims[O.playerName] = 'SEER';
      }
      wsSend({type:'disc_message', text: msg});
      O.isMyDiscTurn = false; O.tplStep = null;
      render();
    });
  });

  // DISCUSS - 投票開始ボタン
  on('btnVoteReady', () => {
    if (O.voteReadyAll) return;
    if (O.voteReadyNames.includes(O.playerName)) return;
    if (!O.alive.some(p=>p.name===O.playerName)) return;
    wsSend({type:'vote_ready'});
  });

  // DISCUSS - フリーテキスト送信
  on('discFreeSend', () => {
    const input = document.getElementById('discFreeInput');
    const text = (input ? input.value : '').trim();
    if (!text) return;
    // CO検出
    const seerKw = ['占い師','占いまし','占った','黒でした','白でした','人狼です','占い結果'];
    const docKw  = ['騎士','護衛','守りまし'];
    if (seerKw.some(kw=>text.includes(kw))) O.roleClaims[O.playerName]='SEER';
    else if (docKw.some(kw=>text.includes(kw))) O.roleClaims[O.playerName]='DOCTOR';
    wsSend({type:'disc_message', text});
    if (O.isMyDiscTurn) { O.isMyDiscTurn=false; O.tplStep=null; }
    if (input) input.value='';
    render();
  });
  { // Enter key for discuss free input
    const fi = document.getElementById('discFreeInput');
    if (fi) fi.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); document.getElementById('discFreeSend')?.click(); } });
  }

  // WOLF CHAT - フリーテキスト送信
  on('wolfFreeSend', () => {
    const input = document.getElementById('wolfFreeInput');
    const text = (input ? input.value : '').trim();
    if (!text) return;
    wolfSend(text);
    if (input) input.value='';
  });
  { // Enter key for wolf free input
    const wi = document.getElementById('wolfFreeInput');
    if (wi) wi.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); document.getElementById('wolfFreeSend')?.click(); } });
  }

  // DISCUSS - クイック同調ボタン（data-agree-name）
  document.querySelectorAll('[data-agree-name]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!O.isMyDiscTurn) return;
      const name = btn.dataset.agreeName;
      const agree_templates = [
        `${name}さんへの疑惑、私も同感です 👍`,
        `確かに${name}さんが気になりますね 🤝`,
        `${name}さんの発言、その通りだと思います ✨`,
        `私も${name}さんへの意見に賛成です 🙋`,
        `${name}さんへの指摘は鋭いと思います 🎯`,
      ];
      const msg = agree_templates[Math.floor(Math.random()*agree_templates.length)];
      wsSend({type:'disc_message', text:msg});
      O.isMyDiscTurn=false; O.tplStep=null;
      render();
    });
  });

  // VOTE - アバターグリッドボタンで投票先を選択
  document.querySelectorAll('.vote-avatar-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.name;
      const sel = document.getElementById('oVoteTgt');
      if (sel) sel.value = name;
      document.querySelectorAll('.vote-avatar-btn').forEach(b => {
        b.style.background = 'rgba(255,255,255,.06)';
        b.style.border = '1px solid rgba(255,255,255,.12)';
      });
      btn.style.background = 'rgba(107,33,168,.3)';
      btn.style.border = '2px solid #6b21a8';
    });
  });

  // ONLINE NIGHT ACTION — wolf はアイコングリッドから選択
  document.querySelectorAll('[data-wolf-pick]').forEach(card => {
    card.addEventListener('click', () => {
      O._wolfNightSel = card.dataset.wolfPick;
      render();
    });
  });

  on('oNightSend', () => {
    const btn = document.getElementById('oNightSend');
    const action = btn ? btn.dataset.action : null;
    // wolf: ステルスグリッドから選択、それ以外: ドロップダウン
    const target = (action === 'wolf') ? (O._wolfNightSel || '') : val('oNightTgt');
    if (!action || !target) return;
    wsSend({type:'night_action', action, target});
    O.nightActionDone = true;
    O._wolfNightSel = null;
    render();
  });

  // ONLINE DAY → 自動遷移（サーバーが vote_start を送ってくる）

  // ONLINE VOTE
  on('oVoteSend', () => {
    const target = val('oVoteTgt');
    if (!target) return;
    wsSend({type:'vote', target});
    O.voteSubmitted = true;
    render();
  });

  // ONLINE DAY → VOTE (WebSocketモード用)
  on('oGoVote', () => wsSend({type:'vote_start'}));

  // ONLINE VOTE RESULT → NEXT
  on('oNextNight', () => wsSend({type:'next_night'}));
  on('oGoGameOver', () => { O.phase = 'game_over'; render(); });

  // ONLINE GAME OVER
  on('oRestart', () => {
    if (O.ws) O.ws.close();
    if (mode === 'p2p') P2PEngine.destroy();
    initOnline(); mode = 'home'; render();
  });
}

// ========== SOLO ENGINE (サーバー不要 / GitHub Pages 対応) ==========
const SoloEngine = (() => {
  const CPU_NAMES = ['ハル','ユキ','アオイ','カイ','リン','ソラ','ナギ','ツバキ','コウ','アン'];
  let R = {};

  function emit(msg)        { setTimeout(() => handleServer(msg), 0); }
  function later(ms, fn)    { setTimeout(fn, ms); }
  function shuffle(a)       { a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function rand(a)          { return a[Math.floor(Math.random()*a.length)]; }
  function rInt(lo,hi)      { return lo+Math.floor(Math.random()*(hi-lo+1)); }
  function alive()          { return R.players.filter(p=>p.alive); }
  function byName(n)        { return R.players.find(p=>p.name===n); }

  // ── 初期化 ────────────────────────────────────────────
  function init(humanName, total) {
    total = Math.max(4, Math.min(10, total));
    const cpuPool = shuffle(CPU_NAMES.filter(n=>n!==humanName));
    const players = [{ name: humanName, isCpu: false, alive: true, role: '' }];
    for (let i=1; i<total; i++)
      players.push({ name: cpuPool[i-1]||`CPU${i}`, isCpu: true, alive: true, role: '' });

    const roles = shuffle([...CONFIGS[total]]);
    players.forEach((p,i) => p.role = roles[i]);
    // CPUにパーソナリティをランダム付与
    players.forEach(p => { if (p.isCpu) p.personality = rand(CPU_PERSONALITIES); });

    R = {
      players, day: 0, phase: 'role',
      wolfTarget: null, doctorTarget: null,
      humanNightDone: false, cpuNightDone: false,
      humanWolfChoice: null,
      discMsgs: [], discOrder: [], discIdx: 0, discRound: 1,
      votes: {}, humanVoted: false, tallyDone: false, resolveDone: false,
      accuCount: {}, seerKnown: {}, log: [],
    };

    const human = players[0];
    const wolves = players.filter(p=>p.role==='WEREWOLF');
    const wolfPartners = human.role==='WEREWOLF'
      ? wolves.filter(p=>p!==human).map(p=>p.name) : [];

    emit({
      type: 'game_started',
      role: human.role,
      wolf_partners: wolfPartners,
      players: players.map(p=>({ pid: players.indexOf(p), name: p.name })),
      is_host: true,
    });
  }

  // ── 人狼チャット ──────────────────────────────────────
  function startWolfChat() {
    R.phase = 'wolf_chat';
    const wolves = alive().filter(p=>p.role==='WEREWOLF');
    emit({ type: 'wolf_chat_start', wolf_names: wolves.map(p=>p.name) });

    const cpuWolves = wolves.filter(p=>p.isCpu);
    const vill = alive().filter(p=>p.role!=='WEREWOLF');
    if (cpuWolves.length && vill.length) {
      const tgt = topAcc(vill) || rand(vill);
      let t = 1000;
      cpuWolves.forEach(w => {
        later(t, () => emit({ type:'wolf_chat_msg', name:w.name,
          text: tplFill(rand(TPL.wolf_night.slice(0,3)), tgt.name) }));
        t += 1300;
      });
    }
  }

  // ── 夜フェーズ ────────────────────────────────────────
  function startNight() {
    R.day++; R.phase = 'night';
    R.wolfTarget = null; R.doctorTarget = null;
    R.humanNightDone = false; R.cpuNightDone = false;
    R.humanWolfChoice = null; R.resolveDone = false;

    const al = alive();
    emit({ type: 'night_start', day: R.day });

    const human = R.players[0];
    if (human.alive) {
      const others = al.filter(p=>p!==human);
      if (human.role==='WEREWOLF') {
        const wolfNames = al.filter(p=>p.role==='WEREWOLF').map(p=>p.name);
        emit({ type:'action_needed', action:'wolf', targets:others.map(p=>({name:p.name})), wolf_names:wolfNames });
      } else if (human.role==='SEER') {
        emit({ type:'action_needed', action:'seer', targets:others.map(p=>({name:p.name})) });
      } else if (human.role==='DOCTOR') {
        emit({ type:'action_needed', action:'doctor', targets:al.map(p=>({name:p.name})) });
      } else {
        R.humanNightDone = true;
      }
    } else {
      R.humanNightDone = true;
    }

    later(1400, () => {
      doCpuNight();
      R.cpuNightDone = true;
      if (R.humanNightDone) later(700, resolveNight);
    });
  }

  function doCpuNight() {
    const al = alive();
    // 人狼CPUの標的
    const cpuWolves = al.filter(p=>p.isCpu && p.role==='WEREWOLF');
    const vill = al.filter(p=>p.role!=='WEREWOLF');
    if (cpuWolves.length && vill.length) {
      R.wolfTarget = (topAcc(vill) || rand(vill)).name;
    }
    // 占い師CPU
    const cpuSeer = al.find(p=>p.isCpu && p.role==='SEER');
    if (cpuSeer) {
      const unknowns = al.filter(p=>p!==cpuSeer && R.seerKnown[p.name]===undefined);
      const tgt = unknowns.length ? rand(unknowns) : rand(al.filter(p=>p!==cpuSeer));
      if (tgt) R.seerKnown[tgt.name] = (tgt.role==='WEREWOLF');
    }
    // 騎士CPU
    const cpuDoc = al.find(p=>p.isCpu && p.role==='DOCTOR');
    if (cpuDoc) {
      R.doctorTarget = (rand(vill.length ? vill : al)).name;
    }
  }

  function resolveNight() {
    if (R.resolveDone) return;
    R.resolveDone = true;
    const wolf = R.humanWolfChoice || R.wolfTarget;
    let victim = null;
    if (wolf && alive().some(p=>p.role==='WEREWOLF')) {
      if (R.doctorTarget === wolf) {
        R.log.push(`第${R.day}夜: 騎士が守り、誰も死ななかった`);
      } else {
        const p = byName(wolf);
        if (p && p.alive) { p.alive=false; victim=p; }
        R.log.push(`第${R.day}夜: ${wolf} が人狼に襲われた`);
      }
    }
    const win = checkWin();
    if (win) { doGameOver(win, victim); return; }
    later(400, () => startDiscuss(victim));
  }

  // ── 議論フェーズ ──────────────────────────────────────
  function _checkVoteReady() {
    if (R.phase !== 'discuss') return;
    if (alive().every(p => R.voteReadySet.has(p.name))) {
      if (R._discFallback) { clearTimeout(R._discFallback); R._discFallback = null; }
      emit({ type: 'vote_ready_all' });
      later(1900, () => { if (R.phase === 'discuss') { R.phase = 'voting'; startVote(); } });
    }
  }

  function startDiscuss(victim) {
    R.phase = 'discuss'; R.discMsgs = [];
    R.discRound = 1; R.discIdx = 0;
    R.voteReadySet = new Set();
    R.discOrder = shuffle(alive().map(p=>p.name));
    // 楽曲を先に選んでタイムスタンプを確定（同室デバイス間での同期用）
    const song = _pickSong();
    const songStarted = Date.now() + 650; // 650ms後に再生開始
    // 音楽が流れない場合のフォールバックタイマー（5分）
    if (R._discFallback) clearTimeout(R._discFallback);
    R._discFallback = setTimeout(() => {
      if (R.phase === 'discuss') { R.phase = 'voting'; startVote(); }
    }, 5 * 60 * 1000);
    emit({
      type: 'discuss_start', round: 1, total_rounds: 2,
      eliminated: victim ? { name:victim.name } : null,
      alive: alive().map(p=>({ name:p.name })),
      song, songStarted,
    });
    later(700, advanceDisc);
  }

  function advanceDisc() {
    if (R.phase !== 'discuss') return; // 音楽終了等でフェーズ変化済みならスキップ
    if (R.discIdx >= R.discOrder.length) {
      if (R.discRound < 2) {
        R.discRound++; R.discIdx = 0;
        emit({ type:'disc_new_round', round:R.discRound });
        later(500, advanceDisc);
      } else {
        // 2ラウンド完了: 全CPUを自動レディ（人間が押すまで音楽継続）
        alive().filter(p=>p.isCpu).forEach((p,i) => {
          later(600 + i*350, () => {
            if (R.phase !== 'discuss') return;
            R.voteReadySet.add(p.name);
            emit({ type:'vote_ready_upd', readyNames:[...R.voteReadySet] });
            _checkVoteReady();
          });
        });
      }
      return;
    }
    const spName = R.discOrder[R.discIdx];
    const sp = byName(spName);
    if (!sp || !sp.alive) { R.discIdx++; advanceDisc(); return; }
    emit({ type:'disc_turn', name:spName });
    if (!sp.isCpu) {
      later(80, () => emit({ type:'your_disc_turn' }));
      // 30秒発言なしで自動進行（音楽未再生環境対策）
      if (R._humanTurnTimer) clearTimeout(R._humanTurnTimer);
      const _autoSpName = spName;
      R._humanTurnTimer = setTimeout(() => {
        if (R.phase !== 'discuss') return;
        if (R.discOrder[R.discIdx] !== _autoSpName) return; // 既に進んでいる
        R.discIdx++;
        later(200, advanceDisc);
      }, 30 * 1000);
    } else {
      // CPUの発言は1.5〜3.5秒かけてゆっくり表示（パーソナリティで速度も変化）
      const delay = sp.personality==='aggressive' ? rInt(1200,2500) : rInt(1800,3800);
      later(delay, () => {
        if (R.phase !== 'discuss') return;
        const text = cpuTpl(sp);
        R.discMsgs.push({ name:spName, text });
        emit({ type:'disc_message', name:spName, text });
        R.discIdx++;
        later(1000, advanceDisc);
      });
    }
  }

  // ── 投票フェーズ ──────────────────────────────────────
  function startVote() {
    R.phase = 'vote'; R.votes = {}; R.humanVoted = false; R.tallyDone = false;
    const al = alive();
    if (!R.players[0].alive) R.humanVoted = true; // 死亡プレイヤーは投票不要
    emit({ type:'vote_start', alive:al.map(p=>({ name:p.name })) });
    const cpus = al.filter(p=>p.isCpu);
    cpus.forEach((cpu, i) => {
      later(1500 + i*1200, () => {
        const tgt = cpuVoteTarget(cpu);
        if (tgt) R.votes[cpu.name] = tgt.name;
        const done = Object.keys(R.votes).length + (R.humanVoted?1:0);
        emit({ type:'vote_progress', done, total:al.length });
        if (R.humanVoted && Object.keys(R.votes).length >= cpus.length)
          later(400, tallyVotes);
      });
    });
    if (!cpus.length) { /* only human, wait for vote */ }
  }

  function cpuVoteTarget(cpu) {
    const al = alive();
    const others = al.filter(p=>p.name!==cpu.name);
    if (!others.length) return null;
    if (cpu.role==='WEREWOLF' || cpu.role==='MADMAN') {
      const vill = others.filter(p=>p.role!=='WEREWOLF');
      return vill.length ? (topAcc(vill)||rand(vill)) : rand(others);
    }
    return topAcc(others) || rand(others);
  }

  function tallyVotes() {
    if (R.tallyDone) return;
    R.tallyDone = true;
    const al = alive();
    const count = {};
    al.forEach(p=>count[p.name]=0);
    Object.values(R.votes).forEach(n=>{ if(count[n]!==undefined) count[n]++; });
    let maxV=0, executed=null;
    Object.entries(count).forEach(([n,c])=>{ if(c>maxV){maxV=c;executed=n;} });
    if (!executed && al.length) executed = rand(al).name;
    const execP = byName(executed);
    if (execP) execP.alive = false;
    R.log.push(`第${R.day}日: ${executed}（${ROLES[execP?.role]?.name}）が処刑された`);
    const win = checkWin();
    emit({
      type: 'vote_result',
      executed, executed_role: execP?.role, tally: count,
      winner: win,
      players: win ? R.players.map(p=>({name:p.name,role:p.role,alive:p.alive})) : null,
      log: win ? R.log : null,
    });
  }

  // ── ユーティリティ ────────────────────────────────────
  function checkWin() {
    const al = alive();
    const w = al.filter(p=>p.role==='WEREWOLF');
    const v = al.filter(p=>p.role!=='WEREWOLF');
    if (!w.length) return 'village';
    if (w.length >= v.length) return 'wolf';
    return null;
  }
  function doGameOver(winner, victim) {
    emit({
      type: 'game_over', winner,
      players: R.players.map(p=>({name:p.name,role:p.role,alive:p.alive})),
      log: R.log,
      eliminated: victim ? {name:victim.name,role:victim.role} : null,
    });
  }
  function topAcc(players) {
    let max=0, best=null;
    players.forEach(p=>{ const c=R.accuCount[p.name]||0; if(c>max){max=c;best=p;} });
    return best;
  }
  function cpuTpl(cpu) {
    const al = alive();
    const others = al.filter(p=>p.name!==cpu.name);
    const wasAcc = (R.accuCount[cpu.name]||0) > 0;
    const pers = cpu.personality || 'balanced';

    // ── 人狼・狂人 ──
    if (cpu.role==='WEREWOLF' || cpu.role==='MADMAN') {
      if (wasAcc) return rand(TPL.defend);
      const vill = others.filter(p=>p.role!=='WEREWOLF');
      if (pers === 'wolf_smart') {
        // 洗練された欺瞞: 時々先手防衛、高確率で告発
        if (Math.random() < 0.12) return rand(TPL.defend);
        if (vill.length && Math.random() < 0.78) {
          const tgt = topAcc(vill)||rand(vill);
          R.accuCount[tgt.name] = (R.accuCount[tgt.name]||0)+1;
          return tplFill(rand(TPL.accuse), tgt.name);
        }
        return rand(TPL.neutral);
      }
      const acProb = pers==='aggressive' ? 0.82 : 0.65;
      if (vill.length && Math.random() < acProb) {
        const tgt = topAcc(vill)||rand(vill);
        R.accuCount[tgt.name] = (R.accuCount[tgt.name]||0)+1;
        return tplFill(rand(TPL.accuse), tgt.name);
      }
      return rand(TPL.neutral);
    }

    // ── 占い師 ──
    if (cpu.role==='SEER') {
      const known = Object.entries(R.seerKnown);
      const revProb = pers==='quick_co' ? 0.88 : pers==='secretive' ? 0.20 : 0.55;
      if (known.length && Math.random() < revProb) {
        const [name, isWolf] = rand(known);
        if (isWolf) R.accuCount[name] = (R.accuCount[name]||0)+2;
        return tplFill(rand(isWolf?TPL.seer_wolf:TPL.seer_safe), name);
      }
      // quick_co: 情報がなくても占い師COする
      if (pers==='quick_co' && R.discRound===1 && Math.random()<0.65)
        return rand(['占い師としてCOします 🔮', '私が占い師です。情報を集めています 🔮', '占い師として名乗り出ます。信じてください 🔮']);
    }

    // ── 騎士 ──
    if (cpu.role==='DOCTOR') {
      const coProb = pers==='quick_co' ? 0.50 : pers==='secretive' ? 0.04 : 0.12;
      if (Math.random() < coProb)
        return rand(['騎士としてCOします 💊', '私は騎士です。誰かを守っています 💊', '騎士COします。大切な人を護衛中です 💊']);
    }

    if (wasAcc) return rand(TPL.defend);

    const accuseProb = pers==='aggressive' ? 0.70 : pers==='secretive' ? 0.10 : pers==='quick_co' ? 0.35 : 0.40;
    if (others.length && Math.random() < accuseProb) {
      const tgt = topAcc(others)||rand(others);
      R.accuCount[tgt.name] = (R.accuCount[tgt.name]||0)+1;
      return tplFill(rand(TPL.accuse), tgt.name);
    }
    if (pers==='secretive') return rand(TPL.neutral);
    if (pers==='aggressive') return rand(TPL.pressure);
    return rand([...TPL.neutral,...TPL.question].slice(0,14));
  }

  // ── クライアントからのメッセージ処理 ─────────────────
  function handle(data) {
    switch (data.type) {
      case 'start_night':
        if (R.players[0].role==='WEREWOLF') startWolfChat(); else startNight();
        break;
      case 'wolf_chat_done':
        later(400, startNight);
        break;
      case 'wolf_chat_msg':
        // ローカル表示済み、ソロではブロードキャスト不要
        break;
      case 'night_action': {
        const human = R.players[0];
        if (human.role==='WEREWOLF') {
          R.humanWolfChoice = data.target;
          emit({ type:'wolf_chosen', target:data.target });
          emit({ type:'action_ack' });
        } else if (human.role==='SEER') {
          const tgt = byName(data.target);
          const isWolf = tgt ? tgt.role==='WEREWOLF' : false;
          R.seerKnown[data.target] = isWolf;
          emit({ type:'seer_result', target:data.target, is_wolf:isWolf });
        } else if (human.role==='DOCTOR') {
          R.doctorTarget = data.target;
          emit({ type:'action_ack' });
        }
        R.humanNightDone = true;
        if (R.cpuNightDone) later(700, resolveNight);
        break;
      }
      case 'music_ended':
        if (R.phase === 'discuss') { R.phase = 'voting'; later(300, startVote); }
        break;
      case 'vote_ready':
        if (R.phase !== 'discuss') break;
        if (!R.voteReadySet) R.voteReadySet = new Set();
        R.voteReadySet.add(R.players[0].name);
        emit({ type:'vote_ready_upd', readyNames:[...R.voteReadySet] });
        _checkVoteReady();
        break;
      case 'disc_message': {
        if (R.phase !== 'discuss') break;
        const human = R.players[0];
        alive().forEach(p=>{
          if (p.name!==human.name && data.text.includes(p.name))
            R.accuCount[p.name] = (R.accuCount[p.name]||0)+1;
        });
        R.discMsgs.push({ name:human.name, text:data.text });
        emit({ type:'disc_message', name:human.name, text:data.text });
        // 自分の順番のときだけ進める（フリー入力はターン外でも発言可）
        if (R.discOrder[R.discIdx] === human.name) {
          if (R._humanTurnTimer) { clearTimeout(R._humanTurnTimer); R._humanTurnTimer = null; }
          R.discIdx++;
          later(450, advanceDisc);
        }
        break;
      }
      case 'vote': {
        const al = alive();
        R.votes[R.players[0].name] = data.target;
        R.humanVoted = true;
        const done = Object.keys(R.votes).length;
        emit({ type:'vote_progress', done, total:al.length });
        const cpusDone = al.filter(p=>p.isCpu).every(p=>R.votes[p.name]!==undefined);
        if (cpusDone) later(500, tallyVotes);
        break;
      }
      case 'next_night':
        later(300, () => R.players[0].role==='WEREWOLF' ? startWolfChat() : startNight());
        break;
    }
  }

  return { init, handle };
})();

let openingTimer = null;

function runOpeningStory() {
  clearTimeout(openingTimer);
  if (mode !== 'opening') return;
  // 最初の呼び出し時にオープニング音楽を開始（自動再生制限の場合は無音で継続）
  if (O_opening.idx === 0 && !bgmAudio) {
    playMusic(_pickSong());
  }
  const seg = STORY_SEGMENTS[O_opening.idx];
  if (seg === undefined) {
    openingTimer = setTimeout(() => {
      fadeOutMusic(1800, () => { mode = 'home'; render(); });
    }, 1200);
    return;
  }
  let ci = 0;
  O_opening.text = '';
  const typeNext = () => {
    if (mode !== 'opening') return;
    if (ci < seg.length) {
      O_opening.text += seg[ci++];
      render();
      openingTimer = setTimeout(typeNext, 85);
    } else {
      render();
      openingTimer = setTimeout(() => { O_opening.idx++; runOpeningStory(); }, 2000);
    }
  };
  typeNext();
}

// ========== P2P ENGINE (PeerJS サーバーレスオンライン) ==========
const P2PEngine = (() => {
  const CPU_NAMES = ['ハル','ユキ','アオイ','カイ','リン','ソラ','ナギ','ツバキ','コウ','アン'];
  let peer = null;
  let guestConn = null;   // guest→host接続
  let hostConns = {};     // host: { connId: DataConnection }
  let connNames = {};     // host: { connId: playerName }
  let R = {};
  let isHost = false;

  function emitLocal(msg) { setTimeout(() => handleServer(msg), 0); }
  function later(ms, fn)  { setTimeout(fn, ms); }
  function rand(a)        { return a[Math.floor(Math.random()*a.length)]; }
  function shuffle(a)     { a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function alive()        { return R.players.filter(p=>p.alive); }
  function byName(n)      { return R.players.find(p=>p.name===n); }
  function topAcc(pls)    { let max=0,best=null; pls.forEach(p=>{const c=R.accuCount[p.name]||0;if(c>max){max=c;best=p;}}); return best; }

  // ホストから全員にブロードキャスト
  function broadcast(msg) {
    const json = JSON.stringify(msg);
    Object.values(hostConns).forEach(c => { try { c.send(json); } catch(e){} });
    emitLocal(msg);
  }
  // ホストから特定プレイヤーのみに送信
  function sendTo(playerName, msg) {
    const json = JSON.stringify(msg);
    const cid = Object.keys(connNames).find(k=>connNames[k]===playerName);
    if (cid && hostConns[cid]) { try { hostConns[cid].send(json); } catch(e){} }
    if (playerName === R.hostName) emitLocal(msg);
  }
  function sendToWolves(msg) {
    R.players.filter(p=>p.role==='WEREWOLF').forEach(p=>sendTo(p.name, msg));
  }

  // ── ホスト: 部屋作成 ──────────────────────────────────
  function createRoom(hostName, onCode) {
    isHost = true;
    R.hostName = hostName;
    R.pendingPlayers = [{ name: hostName, isCpu: false }];
    const code = String(Math.floor(10000 + Math.random() * 89999));
    const pid  = 'WLF' + code;
    peer = new Peer(pid, { debug: 0 });
    peer.on('open', id => {
      const roomCode = id.startsWith('WLF') ? id.slice(3) : id.slice(0,5).toUpperCase();
      onCode(roomCode);
    });
    peer.on('connection', conn => {
      conn.on('open', () => {
        hostConns[conn.peer] = conn;
        conn.on('data', raw => {
          try { handleGuestMsg(conn.peer, JSON.parse(raw)); } catch(e){}
        });
        conn.on('close', () => {
          const name = connNames[conn.peer];
          delete hostConns[conn.peer];
          delete connNames[conn.peer];
          if (name && R.pendingPlayers) {
            R.pendingPlayers = R.pendingPlayers.filter(p=>p.name!==name);
            O.players = O.players.filter(p=>p.name!==name);
            broadcast({ type:'player_left', players: O.players });
          }
        });
      });
    });
    peer.on('error', err => {
      if (err.type === 'unavailable-id') { peer.destroy(); createRoom(hostName, onCode); }
      else alert('P2P接続エラー: ' + err.message);
    });
  }

  // ── ゲスト: 部屋参加 ─────────────────────────────────
  function joinRoom(guestName, code, onJoined, onError) {
    isHost = false;
    peer = new Peer({ debug: 0 });
    peer.on('open', () => {
      guestConn = peer.connect('WLF' + code, { reliable: true });
      guestConn.on('open', () => {
        guestConn.send(JSON.stringify({ type:'join_room', name: guestName }));
        guestConn.on('data', raw => {
          try { handleServer(JSON.parse(raw)); } catch(e){}
        });
        onJoined();
      });
      guestConn.on('error', onError);
    });
    peer.on('error', err => onError(err));
  }

  // ── ゲストからのメッセージをホストが処理 ─────────────
  function handleGuestMsg(connId, data) {
    // '__host__' はホスト自身が送ったメッセージ
    const pname = (connId === '__host__') ? R.hostName : connNames[connId];
    switch (data.type) {
      case 'join_room': {
        const name = (data.name||'ゲスト').trim();
        connNames[connId] = name;
        R.pendingPlayers = R.pendingPlayers||[];
        if (!R.pendingPlayers.find(p=>p.name===name))
          R.pendingPlayers.push({ name, isCpu: false });
        O.players = O.players || [];
        if (!O.players.find(p=>p.name===name))
          O.players.push({ pid: O.players.length, name });
        broadcast({ type:'player_joined', players: O.players });
        break;
      }
      case 'set_cpu_count':
        O.cpuCount = data.count;
        broadcast({ type:'cpu_count_updated', count: data.count });
        break;
      case 'start_game':
        startGame();
        break;
      case 'start_night':
        if (R.players[0]?.role==='WEREWOLF') startWolfChat(); else startNight();
        break;
      case 'wolf_chat_done':
        later(400, startNight);
        break;
      case 'wolf_chat_msg':
        if (pname) sendToWolves({ type:'wolf_chat_msg', name:pname, text:data.text });
        break;
      case 'night_action':
        if (pname) handleNightAction(pname, data);
        break;
      case 'disc_message':
        if (pname) handleDiscMsg(pname, data.text);
        break;
      case 'vote':
        if (pname) handleVote(pname, data.target);
        break;
      case 'music_ended':
        if (isHost && R.phase === 'discuss') { R.phase = 'voting'; later(300, startVote); }
        break;
      case 'vote_ready':
        if (!isHost || R.phase !== 'discuss') break;
        if (!R.voteReadySet) R.voteReadySet = new Set();
        R.voteReadySet.add(pname);
        broadcast({ type:'vote_ready_upd', readyNames:[...R.voteReadySet] });
        _checkVoteReadyP2P();
        break;
      case 'next_night':
        later(300, () => alive().some(p=>p.role==='WEREWOLF'&&!p.isCpu) ? startWolfChat() : startNight());
        break;
    }
  }

  // ── ゲームスタート ───────────────────────────────────
  function startGame() {
    const humanPlayers = R.pendingPlayers || [{ name: R.hostName, isCpu: false }];
    const cpuCount = O.cpuCount || 0;
    const cpuPool = shuffle(CPU_NAMES.filter(n=>!humanPlayers.find(p=>p.name===n)));
    const allPlayers = [...humanPlayers];
    for (let i=0; i<cpuCount; i++)
      allPlayers.push({ name: cpuPool[i]||`CPU${i+1}`, isCpu: true });

    const total = allPlayers.length;
    const roles = shuffle([...(CONFIGS[total]||CONFIGS[6])]);
    R = {
      ...R,
      players: allPlayers.map((p,i)=>({...p, role:roles[i], alive:true})),
      day:0, phase:'role',
      wolfTarget:null, doctorTarget:null,
      humanActionDone:{}, cpuNightDone:false,
      humanWolfChoice:null, resolveDone:false,
      discMsgs:[], discOrder:[], discIdx:0, discRound:1,
      waitingForHuman: null, _discFallback: null,
      votes:{}, humanVotedSet:new Set(), tallyDone:false,
      accuCount:{}, seerKnown:{}, log:[],
    };
    // CPUにパーソナリティをランダム付与
    R.players.forEach(p => { if (p.isCpu) p.personality = rand(CPU_PERSONALITIES); });

    // 各プレイヤーに役職送信
    R.players.forEach(player => {
      if (player.isCpu) return;
      const wolves = R.players.filter(p=>p.role==='WEREWOLF');
      const partners = player.role==='WEREWOLF' ? wolves.filter(p=>p!==player).map(p=>p.name) : [];
      const isH = player.name === R.hostName;
      const msg = {
        type:'game_started', role:player.role, wolf_partners:partners,
        players:R.players.map((p,i)=>({pid:i,name:p.name})), is_host:isH,
      };
      sendTo(player.name, msg);
    });
  }

  // ── 夜 ──────────────────────────────────────────────
  function startWolfChat() {
    R.phase='wolf_chat';
    const wolves = alive().filter(p=>p.role==='WEREWOLF');
    sendToWolves({ type:'wolf_chat_start', wolf_names:wolves.map(p=>p.name) });
    const cpuWolves = wolves.filter(p=>p.isCpu);
    const vill = alive().filter(p=>p.role!=='WEREWOLF');
    if (cpuWolves.length && vill.length) {
      const tgt = topAcc(vill)||rand(vill);
      let t = 1000;
      cpuWolves.forEach(w => {
        later(t, ()=>sendToWolves({type:'wolf_chat_msg',name:w.name,text:tplFill(rand(TPL.wolf_night.slice(0,4)),tgt.name)}));
        t += 1400;
      });
    }
  }

  function startNight() {
    R.day++; R.phase='night';
    R.wolfTarget=null; R.doctorTarget=null;
    R.humanActionDone={}; R.cpuNightDone=false;
    R.humanWolfChoice=null; R.resolveDone=false;
    const al = alive();
    broadcast({ type:'night_start', day:R.day });
    // 各役職プレイヤーにアクション要求
    al.forEach(p => {
      if (p.isCpu) return;
      const others = al.filter(x=>x!==p);
      if (p.role==='WEREWOLF') {
        const wnames = al.filter(x=>x.role==='WEREWOLF').map(x=>x.name);
        sendTo(p.name,{type:'action_needed',action:'wolf',targets:others.map(x=>({name:x.name})),wolf_names:wnames});
      } else if (p.role==='SEER') {
        sendTo(p.name,{type:'action_needed',action:'seer',targets:others.map(x=>({name:x.name}))});
      } else if (p.role==='DOCTOR') {
        sendTo(p.name,{type:'action_needed',action:'doctor',targets:al.map(x=>({name:x.name}))});
      } else {
        R.humanActionDone[p.name] = true;
      }
    });
    later(1600, () => {
      doCpuNight(); R.cpuNightDone=true;
      checkNightDone();
    });
  }

  function doCpuNight() {
    const al = alive();
    const cpuWolves = al.filter(p=>p.isCpu&&p.role==='WEREWOLF');
    const vill = al.filter(p=>p.role!=='WEREWOLF');
    if (cpuWolves.length && vill.length) R.wolfTarget=(topAcc(vill)||rand(vill)).name;
    const cpuSeer = al.find(p=>p.isCpu&&p.role==='SEER');
    if (cpuSeer) {
      const unk = al.filter(p=>p!==cpuSeer&&R.seerKnown[p.name]===undefined);
      const t = unk.length?rand(unk):rand(al.filter(p=>p!==cpuSeer));
      if (t) R.seerKnown[t.name]=(t.role==='WEREWOLF');
    }
    const cpuDoc = al.find(p=>p.isCpu&&p.role==='DOCTOR');
    if (cpuDoc) { const t=rand(al); if(t) R.doctorTarget=t.name; }
  }

  function handleNightAction(pname, data) {
    const player = byName(pname);
    if (!player) return;
    if (player.role==='WEREWOLF') {
      R.humanWolfChoice=data.target;
      sendToWolves({type:'wolf_chosen',target:data.target});
      sendTo(pname,{type:'action_ack'});
    } else if (player.role==='SEER') {
      const tgt=byName(data.target);
      const iw=tgt?tgt.role==='WEREWOLF':false;
      R.seerKnown[data.target]=iw;
      sendTo(pname,{type:'seer_result',target:data.target,is_wolf:iw});
    } else if (player.role==='DOCTOR') {
      R.doctorTarget=data.target;
      sendTo(pname,{type:'action_ack'});
    }
    R.humanActionDone[pname]=true;
    checkNightDone();
  }

  function checkNightDone() {
    const al=alive();
    const humans=al.filter(p=>!p.isCpu);
    const allDone=humans.every(p=>R.humanActionDone[p.name]);
    if (allDone&&R.cpuNightDone) later(700,resolveNight);
  }

  function resolveNight() {
    if (R.resolveDone) return; R.resolveDone=true;
    const wt=R.humanWolfChoice||R.wolfTarget;
    const dt=R.doctorTarget;
    let victim=null;
    if (wt&&wt!==dt) { const v=byName(wt); if(v){v.alive=false;victim=v;R.log.push(`第${R.day}夜:${wt}が人狼に倒された`);} }
    else if (wt&&wt===dt) R.log.push(`第${R.day}夜:騎士が${wt}を護衛した`);
    const win=checkWinP2P();
    if (win) { doGameOver(win,victim); return; }
    later(400,()=>startDiscuss(victim));
  }

  // ── 議論 ────────────────────────────────────────────
  function _checkVoteReadyP2P() {
    if (R.phase !== 'discuss') return;
    if (alive().every(p => R.voteReadySet.has(p.name))) {
      if (R._discFallback) { clearTimeout(R._discFallback); R._discFallback = null; }
      broadcast({ type:'vote_ready_all' });
      later(1900, () => { if (R.phase === 'discuss') { R.phase='voting'; startVote(); } });
    }
  }

  function startDiscuss(victim) {
    R.phase='discuss'; R.discRound=1; R.discMsgs=[];
    R.waitingForHuman=null;
    R.voteReadySet = new Set();
    const elim=victim?{name:victim.name}:null;
    const al=alive();
    const song = _pickSong();
    const songStarted = Date.now() + 650;
    if (R._discFallback) clearTimeout(R._discFallback);
    R._discFallback = setTimeout(()=>{ if(R.phase==='discuss'){R.phase='voting';startVote();} }, 5*60*1000);
    broadcast({type:'discuss_start',round:1,total_rounds:2,eliminated:elim,alive:al.map(p=>({name:p.name})),song,songStarted});
    R.discOrder=shuffle([...al]);
    R.discIdx=0;
    later(600,advanceDisc);
  }

  function advanceDisc() {
    if (R.phase !== 'discuss') return;
    if (R.discIdx >= R.discOrder.length) {
      if (R.discRound < 2) {
        R.discRound = 2; R.discIdx = 0;
        broadcast({ type:'disc_new_round', round:2 });
        later(700, advanceDisc);
      } else {
        // 2ラウンド完了: 全CPUを自動レディ
        alive().filter(p=>p.isCpu).forEach((p,i) => {
          later(600 + i*350, () => {
            if (R.phase !== 'discuss') return;
            R.voteReadySet.add(p.name);
            broadcast({ type:'vote_ready_upd', readyNames:[...R.voteReadySet] });
            _checkVoteReadyP2P();
          });
        });
      }
      return;
    }
    const player = R.discOrder[R.discIdx];
    if (!player || !player.alive) { R.discIdx++; later(300, advanceDisc); return; }
    if (player.isCpu) {
      broadcast({ type:'disc_turn', name:player.name });
      const delay = (player.personality==='aggressive') ? (1400+Math.random()*1600) : (2000+Math.random()*2200);
      later(delay, () => {
        if (R.phase !== 'discuss') return;
        const txt = cpuTpl(player);
        R.discMsgs.push({ name:player.name, text:txt });
        broadcast({ type:'disc_message', name:player.name, text:txt });
        R.discIdx++;
        later(1000, advanceDisc);
      });
    } else {
      broadcast({ type:'disc_turn', name:player.name });
      sendTo(player.name, { type:'your_disc_turn' });
      R.waitingForHuman = player.name;
      R.discIdx++;
      // 30秒経っても発言しなければ自動進行（音楽なし環境対策）
      if (R._humanTurnTimer) clearTimeout(R._humanTurnTimer);
      R._humanTurnTimer = setTimeout(() => {
        if (R.phase !== 'discuss' || R.waitingForHuman !== player.name) return;
        R.waitingForHuman = null;
        later(200, advanceDisc);
      }, 30 * 1000);
    }
  }

  function handleDiscMsg(pname, text) {
    if (R.phase !== 'discuss') return;
    alive().forEach(p => {
      if (p.name !== pname && text.includes(p.name))
        R.accuCount[p.name] = (R.accuCount[p.name]||0) + 1;
    });
    R.discMsgs.push({ name:pname, text });
    broadcast({ type:'disc_message', name:pname, text });
    // 順番が来ていたプレイヤーの発言なら次へ進む（フリー入力はターン外でも発言可）
    if (R.waitingForHuman === pname) {
      R.waitingForHuman = null;
      if (R._humanTurnTimer) { clearTimeout(R._humanTurnTimer); R._humanTurnTimer = null; }
      later(600, advanceDisc);
    }
  }

  // ── 投票 ─────────────────────────────────────────────
  function startVote() {
    R.phase='vote'; R.votes={}; R.humanVotedSet=new Set(); R.tallyDone=false;
    const al=alive();
    // 死亡プレイヤーは投票不要
    al.filter(p=>!p.isCpu).forEach(p=>{ /* 生きている人間のみ投票 */ });
    broadcast({type:'vote_start',alive:al.map(p=>({name:p.name}))});
    const cpus=al.filter(p=>p.isCpu);
    cpus.forEach((cpu,i)=>later(900+i*600,()=>{
      const tgt=cpuVoteTarget(cpu);
      if (tgt) R.votes[cpu.name]=tgt.name;
      const humansVoted=R.humanVotedSet.size;
      const humanCount=al.filter(p=>!p.isCpu).length;
      broadcast({type:'vote_progress',done:Object.keys(R.votes).length+humansVoted,total:al.length});
      if (humansVoted>=humanCount&&Object.keys(R.votes).length>=cpus.length) later(400,tallyVotes);
    }));
    if (!cpus.length && al.filter(p=>!p.isCpu).length===0) later(500,tallyVotes);
  }

  function handleVote(pname, target) {
    R.votes[pname]=target;
    R.humanVotedSet.add(pname);
    const al=alive();
    broadcast({type:'vote_progress',done:Object.keys(R.votes).length,total:al.length});
    const humansAlive=al.filter(p=>!p.isCpu);
    if (R.humanVotedSet.size>=humansAlive.length&&Object.keys(R.votes).length>=al.filter(p=>p.isCpu).length)
      later(500,tallyVotes);
  }

  function cpuVoteTarget(cpu) {
    const al=alive(), others=al.filter(p=>p.name!==cpu.name);
    if (!others.length) return null;
    if (cpu.role==='WEREWOLF'||cpu.role==='MADMAN') {
      const vill=others.filter(p=>p.role!=='WEREWOLF');
      return vill.length?(topAcc(vill)||rand(vill)):rand(others);
    }
    const wolves=others.filter(p=>p.role==='WEREWOLF');
    if (wolves.length&&Math.random()<0.5) return topAcc(wolves)||rand(wolves);
    return topAcc(others)||rand(others);
  }

  function tallyVotes() {
    if (R.tallyDone) return; R.tallyDone=true;
    const tally={};
    Object.values(R.votes).forEach(t=>tally[t]=(tally[t]||0)+1);
    const maxV=Math.max(...Object.values(tally));
    const top=Object.keys(tally).filter(n=>tally[n]===maxV);
    const executed=top[Math.floor(Math.random()*top.length)];
    const execP=byName(executed);
    if (execP) execP.alive=false;
    R.log.push(`第${R.day}日:${executed}が処刑された`);
    const win=checkWinP2P();
    broadcast({
      type:'vote_result', executed, executed_role:execP?.role, tally,
      winner:win,
      players:win?R.players.map(p=>({name:p.name,role:p.role,alive:p.alive})):null,
      log:win?R.log:null,
    });
  }

  function checkWinP2P() {
    const al=alive();
    const w=al.filter(p=>p.role==='WEREWOLF').length;
    const v=al.length-w;
    if (!w) return 'village';
    if (w>=v) return 'wolf';
    return null;
  }

  function doGameOver(winner, victim) {
    broadcast({
      type:'game_over', winner,
      players:R.players.map(p=>({name:p.name,role:p.role,alive:p.alive})),
      log:R.log,
      eliminated:victim?{name:victim.name,role:victim.role}:null,
    });
  }

  function cpuTpl(cpu) {
    const al=alive(), others=al.filter(p=>p.name!==cpu.name);
    const wasAcc=(R.accuCount[cpu.name]||0)>0;
    const pers = cpu.personality || 'balanced';

    // ── 人狼・狂人 ──
    if (cpu.role==='WEREWOLF'||cpu.role==='MADMAN') {
      if (wasAcc) return rand(TPL.defend);
      const vill=others.filter(p=>p.role!=='WEREWOLF');
      if (pers==='wolf_smart') {
        if (Math.random()<0.12) return rand(TPL.defend);
        if (vill.length&&Math.random()<0.78) {
          const t=topAcc(vill)||rand(vill);
          R.accuCount[t.name]=(R.accuCount[t.name]||0)+1;
          return tplFill(rand(TPL.accuse),t.name);
        }
        return rand(TPL.neutral);
      }
      const acProb = pers==='aggressive' ? 0.82 : 0.65;
      if (vill.length&&Math.random()<acProb) {
        const t=topAcc(vill)||rand(vill);
        R.accuCount[t.name]=(R.accuCount[t.name]||0)+1;
        return tplFill(rand(TPL.accuse),t.name);
      }
      return rand(TPL.neutral);
    }

    // ── 占い師 ──
    if (cpu.role==='SEER') {
      const known=Object.entries(R.seerKnown);
      const revProb = pers==='quick_co' ? 0.88 : pers==='secretive' ? 0.20 : 0.55;
      if (known.length&&Math.random()<revProb) {
        const [nm,iw]=rand(known);
        if(iw) R.accuCount[nm]=(R.accuCount[nm]||0)+2;
        return tplFill(rand(iw?TPL.seer_wolf:TPL.seer_safe),nm);
      }
      if (pers==='quick_co' && R.discRound===1 && Math.random()<0.65)
        return rand(['占い師としてCOします 🔮','私が占い師です。情報を集めています 🔮','占い師として名乗り出ます 🔮']);
    }

    // ── 騎士 ──
    if (cpu.role==='DOCTOR') {
      const coProb = pers==='quick_co' ? 0.50 : pers==='secretive' ? 0.04 : 0.12;
      if (Math.random()<coProb)
        return rand(['騎士としてCOします 💊','私は騎士です。誰かを守っています 💊','騎士COします。護衛中です 💊']);
    }

    if (wasAcc) return rand(TPL.defend);
    const accuseProb = pers==='aggressive' ? 0.70 : pers==='secretive' ? 0.10 : pers==='quick_co' ? 0.35 : 0.38;
    if (others.length&&Math.random()<accuseProb) {
      const t=topAcc(others)||rand(others);
      R.accuCount[t.name]=(R.accuCount[t.name]||0)+1;
      return tplFill(rand(TPL.accuse),t.name);
    }
    if (pers==='secretive') return rand(TPL.neutral);
    if (pers==='aggressive') return rand(TPL.pressure);
    return rand([...TPL.neutral,...TPL.question].slice(0,14));
  }

  // ── 外部公開 ─────────────────────────────────────────
  function wsSendP2P(msg) {
    if (isHost) { handleGuestMsg('__host__', msg); }
    else if (guestConn&&guestConn.open) { guestConn.send(JSON.stringify(msg)); }
  }

  function destroy() {
    if (peer) { try{peer.destroy();}catch(e){} peer=null; }
    hostConns={}; connNames={}; guestConn=null; isHost=false; R={};
  }

  return { createRoom, joinRoom, wsSendP2P, startGame, destroy };
})();
